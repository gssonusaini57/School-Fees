<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .month-chip { font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: 800; border: 1px solid transparent; text-transform: uppercase; }
        .paid { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .pending { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div class="no-print">
        <nav class="bg-white text-indigo-900 p-6 shadow-xl mb-8 border-b-4 border-indigo-600">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-5">
                    <img src="logo.PNG" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=LOGO'" class="w-20 h-20 rounded-full border-4 border-indigo-100 shadow-lg object-cover">
                    <div>
                        <h1 class="text-3xl md:text-4xl font-black tracking-tighter uppercase leading-none">YOUR SCHOOL NAME</h1>
                        <p class="text-indigo-500 font-bold text-xs uppercase tracking-[0.3em] mt-2 italic">Fee Management Portal</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl text-xs font-bold shadow-lg hover:bg-indigo-700 transition-all">🔄 Sync Data</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-blue-500">
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Total Collected</p>
                    <h2 id="sumPaid" class="text-4xl font-black text-indigo-900 tracking-tighter">₹0</h2>
                </div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-rose-500">
                    <p class="text-rose-400 text-[10px] font-bold uppercase mb-2">Total Dues</p>
                    <h2 id="sumDue" class="text-4xl font-black text-rose-600 tracking-tighter">₹0</h2>
                </div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-emerald-500">
                    <p class="text-emerald-400 text-[10px] font-bold uppercase mb-2">Total Students</p>
                    <h2 id="activeCount" class="text-4xl font-black text-emerald-600 tracking-tighter">0</h2>
                </div>
            </div>

            <div class="mb-10">
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search by Student or Father Name..." 
                       class="w-full p-5 rounded-3xl border-none shadow-xl outline-none font-semibold text-slate-600 bg-white focus:ring-4 focus:ring-indigo-100 transition-all">
            </div>

            <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50/50 text-slate-400 text-[11px] uppercase font-black tracking-widest border-b">
                                <th class="p-8">Student Detail</th>
                                <th class="p-8 text-right">Total Fee</th>
                                <th class="p-8 text-right">Paid</th>
                                <th class="p-8 text-right">Balance</th>
                                <th class="p-8 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentList" class="divide-y divide-slate-50 font-semibold italic">
                        </tbody>
                    </table>
                </div>
                <div id="loader" class="p-20 text-center font-bold text-indigo-300 animate-pulse italic">Connecting to Database...</div>
            </div>
        </main>
    </div>

    <div id="printArea" class="print-only p-12 max-w-3xl mx-auto border-8 border-double border-slate-900 rounded-[3rem] m-5">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black tracking-tighter uppercase mb-2">YOUR SCHOOL NAME</h1>
            <p class="text-sm font-bold text-slate-700">Main Road, Your City</p>
            <p class="text-sm font-bold text-indigo-700 italic">Official Fee Receipt</p>
            <div class="w-full border-b-4 border-slate-900 my-6"></div>
        </div>
        <div class="grid grid-cols-2 gap-10 text-sm mb-10 p-8 bg-slate-50 rounded-[2rem]" id="receiptContent"></div>
        <div class="flex justify-between items-center px-10 py-6 border-4 border-slate-100 rounded-3xl mb-12">
            <span class="font-bold text-slate-400 uppercase text-xs tracking-widest">Status:</span>
            <span id="pStatus" class="font-black text-2xl italic"></span>
        </div>
    </div>

    <script>
        // AAPKA SAHI LINK
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv&t=" + new Date().getTime();
        
        let masterData = [];
        const months = ["April", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec", "Jan", "Feb", "March"];

        async function init() {
            try {
                const response = await fetch(sheetURL);
                if (!response.ok) throw new Error("404");
                const csv = await response.text();
                
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            // Cleaning Number Data
                            const cleanNum = (val) => parseInt(String(val || 0).replace(/\D/g,'')) || 0;
                            const tot = cleanNum(row['Total Fee']);
                            const paid = cleanNum(row['Paid Fee']);
                            
                            let mStatus = {};
                            months.forEach(m => { mStatus[m] = cleanNum(row[m]) > 0 ? true : false; });
                            
                            return {
                                roll: row['Roll No'] || '-',
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                class: row['Class'] || '-',
                                total: tot, paid: paid, bal: tot - paid,
                                months: mStatus
                            }
                        }).filter(s => s.name.trim() != "");

                        document.getElementById('loader').classList.add('hidden');
                        render(masterData);
                    }
                });
            } catch (e) {
                document.getElementById('loader').innerText = "🔴 Connection Error: Please Refresh";
            }
        }

        function render(data) {
            const list = document.getElementById('studentList');
            let tP = 0, tD = 0, tC = 0;

            list.innerHTML = data.map((s) => {
                tP += s.paid; tD += s.bal; tC++;
                let mHTML = months.map(m => `<span class="month-chip ${s.months[m] ? 'paid' : 'pending'}">${m.substring(0,3)}</span>`).join('');

                return `
                <tr class="hover:bg-indigo-50/50 transition duration-300 border-b border-slate-50">
                    <td class="p-8">
                        <div class="text-slate-900 font-bold text-xl leading-tight">${s.name}</div>
                        <div class="text-[10px] text-slate-400 mb-4 font-bold uppercase tracking-tight">S/O ${s.father} | Class ${s.class}</div>
                        <div class="flex flex-wrap gap-1">${mHTML}</div>
                    </td>
                    <td class="p-8 text-right font-bold text-slate-400 text-lg">₹${s.total}</td>
                    <td class="p-8 text-right text-emerald-600 font-black text-lg">₹${s.paid}</td>
                    <td class="p-8 text-right text-rose-600 font-black text-xl">₹${s.bal}</td>
                    <td class="p-8 text-center">
                        <button onclick='printSlip(${JSON.stringify(s)})' class="bg-indigo-600 text-white font-bold text-[10px] px-5 py-3 rounded-2xl transition-all uppercase shadow-md">📄 Receipt</button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('sumPaid').innerText = "₹" + tP.toLocaleString();
            document.getElementById('sumDue').innerText = "₹" + tD.toLocaleString();
            document.getElementById('activeCount').innerText = tC;
        }

        function printSlip(s) {
            document.getElementById('receiptContent').innerHTML = `
                <div class="border-b-2 pb-2"><p class="text-[9px] text-slate-400 font-black uppercase">Student</p><p class="text-xl font-black">${s.name}</p></div>
                <div class="border-b-2 pb-2"><p class="text-[9px] text-slate-400 font-black uppercase">Father</p><p class="text-xl font-black">${s.father}</p></div>
                <div class="border-b-2 pb-2"><p class="text-[9px] text-slate-400 font-black uppercase">Roll/Class</p><p class="text-xl font-black">${s.roll}/${s.class}</p></div>
                <div class="border-b-2 pb-2"><p class="text-[9px] text-slate-400 font-black uppercase">Total Fee</p><p class="text-xl font-black">₹${s.total}</p></div>
                <div class="bg-indigo-100 p-6 rounded-3xl"><p class="text-[9px] text-indigo-400 font-black uppercase">Paid</p><p class="text-3xl font-black text-indigo-700 italic">₹${s.paid}</p></div>
                <div class="bg-rose-100 p-6 rounded-3xl"><p class="text-[9px] text-rose-400 font-black uppercase">Balance</p><p class="text-3xl font-black text-rose-700 italic">₹${s.bal}</p></div>
            `;
            document.getElementById('pStatus').innerText = s.bal <= 0 ? "FULLY PAID ✅" : "PENDING ❌";
            document.getElementById('pStatus').className = s.bal <= 0 ? "font-black text-2xl text-emerald-600 italic" : "font-black text-2xl text-rose-600 italic";
            window.print();
        }

        function filterData() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            const filtered = masterData.filter(d => d.name.toLowerCase().includes(v) || d.father.toLowerCase().includes(v));
            render(filtered);
        }

        window.onload = init;
    </script>
</body>
</html>
