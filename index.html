<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School - Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .print-area { display: none; }
        @media print { 
            .no-print { display: none !important; } 
            .print-active { display: block !important; }
            body { background: white; padding: 0; }
            table { border-collapse: collapse; width: 100%; margin-top: 10px; position: relative; z-index: 10; background: transparent !important; }
            th, td { border: 1px solid #000 !important; padding: 6px; text-align: left; font-size: 10px; }
            .watermark-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); width: 300px; opacity: 0.1 !important; z-index: -1; }
            .receipt-box { border: 2px dashed #000; padding: 15px; margin-bottom: 25px; page-break-inside: avoid; border-radius: 15px; position: relative; }
            .signature-img { width: 80px; position: absolute; bottom: 30px; right: 40px; opacity: 0.8; }
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="feeModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-black text-indigo-900 mb-2 uppercase italic">New Payment</h2>
            <p id="targetStudent" class="text-indigo-500 font-bold text-sm mb-6 border-b pb-2 italic uppercase"></p>
            <div class="space-y-4">
                <input type="number" id="feeAmount" placeholder="Amount (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold text-lg">
                <select id="feeMonth" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none font-bold">
                    <option value="April">April</option><option value="May">May</option><option value="June">June</option>
                    <option value="July">July</option><option value="Aug">Aug</option><option value="Sept">Sept</option>
                    <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
                    <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="March">March</option>
                </select>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 bg-slate-100 font-bold py-4 rounded-2xl">CANCEL</button>
                    <button id="submitBtn" onclick="submitFee()" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg">SUBMIT</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <nav class="bg-white text-indigo-900 p-6 shadow-xl mb-8 border-b-4 border-indigo-600 no-print">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-5">
                    <img src="logo.PNG" class="w-16 h-16 rounded-full border-4 border-indigo-100 shadow-lg">
                    <div>
                        <h1 class="text-2xl font-black uppercase tracking-tighter leading-none">Khalsa International School</h1>
                        <p class="text-indigo-500 font-bold text-[10px] italic">Patiala, Punjab | Ph: 94784-80771</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="classReportBtn" onclick="printClassReport()" class="hidden bg-rose-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">Defaulter List</button>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">🔄 Sync</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 no-print">
            <div id="loader" class="p-20 text-center font-bold text-indigo-400 animate-pulse italic text-xl">Syncing Data...</div>
            
            <div id="mainContent" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center uppercase italic font-bold">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-blue-500">Collected<h2 id="sumPaid" class="text-3xl font-black text-indigo-900">₹0</h2></div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-rose-500">Pending<h2 id="sumDue" class="text-3xl font-black text-rose-600">₹0</h2></div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-emerald-500">Students<h2 id="activeCount" class="text-3xl font-black text-emerald-600">0</h2></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 bg-white p-3 rounded-[2rem] shadow-lg border border-slate-100 italic">
                    <div class="md:col-span-2"><input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search Name..." class="w-full p-4 rounded-2xl border-none outline-none font-semibold bg-slate-50"></div>
                    <div><select id="classSelect" onchange="applyFilters()" class="w-full p-4 rounded-2xl border-none font-bold text-indigo-600 bg-indigo-50"><option value="All">All Classes</option></select></div>
                </div>

                <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden italic">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead><tr class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black border-b"><th class="p-8">Student Detail</th><th class="p-8 text-right">Balance</th><th class="p-8 text-center uppercase tracking-widest">Action</th></tr></thead>
                            <tbody id="studentList" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="printAreaSingle" class="print-area">
        <div class="receipt-box">
            <div class="flex justify-between items-center mb-4 border-b pb-2"><div class="flex items-center gap-3"><img src="logo.PNG" class="w-12 h-12 rounded-full border"><div><h1 class="text-xl font-black uppercase">Khalsa
