<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="bg-indigo-900 text-white p-6 rounded-3xl shadow-xl mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold italic">School Fee Management</h1>
                <p id="status" class="text-indigo-300 text-xs font-bold uppercase tracking-widest mt-1 italic">🔄 Connecting to Excel...</p>
            </div>
            <button onclick="loadData()" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded-xl text-sm transition font-bold">Refresh Data</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <input type="text" id="searchBox" onkeyup="filterData()" placeholder="Search by Student or Father Name..." 
                   class="p-4 rounded-2xl shadow-sm border-none outline-none focus:ring-2 focus:ring-indigo-500 text-gray-700">
            <select id="classFilter" onchange="filterData()" class="p-4 rounded-2xl shadow-sm outline-none font-bold text-gray-600 bg-white">
                <option value="All">All Classes</option>
                <option value="Nursery">Nursery</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-50 border-b text-gray-400 text-[10px] uppercase font-black tracking-widest">
                            <th class="p-5">Roll No</th>
                            <th class="p-5 text-indigo-900">Student Name</th>
                            <th class="p-5">Father's Name</th>
                            <th class="p-5 text-right">Total Fee</th>
                            <th class="p-5 text-right text-green-600">Paid</th>
                            <th class="p-5 text-right text-red-600">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-50 text-sm font-medium">
                        </tbody>
                </table>
            </div>
            <div id="noData" class="p-20 text-center text-gray-400 hidden italic font-semibold">Koi record nahi mila.</div>
        </div>
    </div>

    <script>
        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        let masterData = [];

        async function loadData() {
            const statusText = document.getElementById('status');
            try {
                // Using Fetch for better CORS handling
                const response = await fetch(csvURL);
                const dataText = await response.text();
                
                Papa.parse(dataText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        masterData = results.data.map(row => {
                            const total = parseInt(String(row['Total Fee'] || 0).replace(/\D/g,'')) || 0;
                            const paid = parseInt(String(row['Paid Fee'] || 0).replace(/\D/g,'')) || 0;
                            return {
                                roll: row['Roll No'] || '-',
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                class: row['Class'] || 'N/A',
                                total: total,
                                paid: paid,
                                balance: total - paid
                            };
                        }).filter(s => s.name.trim() !== "");

                        statusText.innerText = "🟢 Live: Excel Sync Active";
                        statusText.className = "text-green-400 text-xs font-bold uppercase tracking-widest mt-1";
                        renderTable(masterData);
                    }
                });
            } catch (error) {
                statusText.innerText = "🔴 Connection Error: Check Google Sheet Publish Settings";
                statusText.className = "text-red-400 text-xs font-bold uppercase tracking-widest mt-1";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            const noData = document.getElementById('noData');
            
            if(data.length === 0) {
                noData.classList.remove('hidden');
                tbody.innerHTML = "";
                return;
            }
            noData.classList.add('hidden');
            
            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-5 font-bold text-gray-400">${s.roll}</td>
                    <td class="p-5 font-bold text-gray-800">${s.name}</td>
                    <td class="p-5 text-indigo-600 italic font-semibold">${s.father}</td>
                    <td class="p-5 text-right font-bold text-gray-500">₹${s.total.toLocaleString()}</td>
                    <td class="p-5 text-right text-green-600 font-black">₹${s.paid.toLocaleString()}</td>
                    <td class="p-5 text-right">
                        <span class="${s.balance > 0 ? 'bg-red-50 text-red-600 px-3 py-1 rounded-lg font-black' : 'text-gray-300'}">
                            ₹${s.balance.toLocaleString()}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const classVal = document.getElementById('classFilter').value;
            const filtered = masterData.filter(s => 
                (s.name.toLowerCase().includes(search) || s.father.toLowerCase().includes(search)) && 
                (classVal === "All" || s.class === classVal)
            );
            renderTable(filtered);
        }

        window.onload = loadData;
    </script>
</body>
</html>
