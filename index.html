<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-slate-100 p-4 md:p-10">

    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl p-6 md:p-10">
        <header class="flex justify-between items-center mb-8 border-b pb-6">
            <div>
                <h1 class="text-3xl font-black text-indigo-900 italic">Saraswati School</h1>
                <p id="status" class="text-xs font-bold text-orange-500 uppercase mt-1">Connecting...</p>
            </div>
            <button onclick="location.reload()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-bold">Refresh</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-blue-50 p-5 rounded-2xl border-l-4 border-blue-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Total Fee</p>
                <p id="statTotal" class="text-2xl font-black text-gray-800">₹0</p>
            </div>
            <div class="bg-green-50 p-5 rounded-2xl border-l-4 border-green-500">
                <p class="text-green-600 text-xs font-bold uppercase">Collected</p>
                <p id="statPaid" class="text-2xl font-black text-green-700">₹0</p>
            </div>
            <div class="bg-red-50 p-5 rounded-2xl border-l-4 border-red-500">
                <p class="text-red-500 text-xs font-bold uppercase">Pending</p>
                <p id="statPending" class="text-2xl font-black text-red-700">₹0</p>
            </div>
        </div>

        <input type="text" id="searchBox" onkeyup="filterData()" placeholder="Search Student or Father Name..." 
               class="w-full p-4 mb-6 bg-gray-50 border-none rounded-2xl shadow-inner outline-none focus:ring-2 focus:ring-indigo-500 font-medium">

        <div class="overflow-x-auto rounded-2xl border border-gray-100">
            <table class="w-full text-left">
                <thead class="bg-indigo-900 text-white text-xs uppercase font-bold">
                    <tr>
                        <th class="p-4">Roll</th>
                        <th class="p-4">Student Name</th>
                        <th class="p-4">Father Name</th>
                        <th class="p-4 text-right">Paid</th>
                        <th class="p-4 text-right text-red-300">Balance</th>
                    </tr>
                </thead>
                <tbody id="dataTable" class="divide-y divide-gray-100 text-sm font-semibold">
                    </tbody>
            </table>
        </div>
        <div id="loader" class="p-20 text-center text-gray-400 italic">Finding Records...</div>
    </div>

    <script>
        // APNI SHEET KE HISAB SE YE DO CHEEZEIN BADLEIN
        const sheetID = "1TODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup";
        const gid = "1095208276"; 
        
        // Final Reliable URL
        const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/pub?gid=${gid}&single=true&output=csv`;
        
        let masterData = [];

        async function loadData() {
            const statusBox = document.getElementById('status');
            try {
                const response = await fetch(csvURL);
                if (!response.ok) throw new Error("Link Expired or Private");
                
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        masterData = results.data.map(row => {
                            const total = parseInt(String(row['Total Fee'] || 0).replace(/\D/g,'')) || 0;
                            const paid = parseInt(String(row['Paid Fee'] || 0).replace(/\D/g,'')) || 0;
                            return {
                                roll: row['Roll No'] || '-',
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                total: total,
                                paid: paid,
                                balance: total - paid
                            };
                        }).filter(s => s.name && s.name.trim() !== "");

                        if (masterData.length > 0) {
                            statusBox.innerHTML = "🟢 Connected to Excel";
                            statusBox.className = "text-xs font-bold text-green-600 uppercase mt-1";
                            document.getElementById('loader').classList.add('hidden');
                            renderTable(masterData);
                        } else {
                            statusBox.innerHTML = "🟡 Sheet Is Empty";
                        }
                    }
                });
            } catch (err) {
                statusBox.innerHTML = "🔴 ERROR: Settings Check Karein (File > Share > Publish)";
                console.error(err);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            let tTotal = 0, tPaid = 0, tPending = 0;

            tbody.innerHTML = data.map(s => {
                const bal = s.total - s.paid;
                tTotal += s.total; tPaid += s.paid; tPending += bal;
                return `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-4 text-gray-400 font-mono">${s.roll}</td>
                    <td class="p-4 font-black text-gray-800">${s.name}</td>
                    <td class="p-4 text-indigo-600 italic font-medium">${s.father}</td>
                    <td class="p-4 text-right text-green-600">₹${s.paid.toLocaleString()}</td>
                    <td class="p-4 text-right">
                        <span class="${bal > 0 ? 'text-red-600 font-black' : 'text-gray-300'}">₹${bal.toLocaleString()}</span>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('statTotal').innerText = "₹" + tTotal.toLocaleString();
            document.getElementById('statPaid').innerText = "₹" + tPaid.toLocaleString();
            document.getElementById('statPending').innerText = "₹" + tPending.toLocaleString();
        }

        function filterData() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const filtered = masterData.filter(s => 
                s.name.toLowerCase().includes(search) || s.father.toLowerCase().includes(search)
            );
            renderTable(filtered);
        }

        window.onload = loadData;
    </script>
</body>
</html>
