<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fees - Monthly & Print System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .month-chip { font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: 800; border: 1px solid transparent; text-transform: uppercase; }
        .paid { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .pending { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div class="no-print">
        <nav class="bg-indigo-700 text-white p-6 shadow-2xl mb-8 border-b-4 border-indigo-900">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-white p-2 rounded-xl text-indigo-700 font-black">SS</div>
                    <h1 class="text-xl font-black italic tracking-tighter uppercase">School Management Pro</h1>
                </div>
                <button onclick="location.reload()" class="bg-indigo-600 px-5 py-2 rounded-xl text-xs font-bold shadow-lg">🔄 Sync Data</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-blue-500">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Total Collected</p>
                    <h2 id="sumPaid" class="text-3xl font-black text-indigo-900 tracking-tighter">₹0</h2>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-rose-500">
                    <p class="text-rose-400 text-[10px] font-bold uppercase tracking-widest">Total Pending</p>
                    <h2 id="sumDue" class="text-3xl font-black text-rose-600 tracking-tighter">₹0</h2>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-emerald-500">
                    <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest">Active Students</p>
                    <h2 id="activeCount" class="text-3xl font-black text-emerald-600 tracking-tighter">0</h2>
                </div>
            </div>

            <div class="mb-8">
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search Student Name or Father Name..." 
                       class="w-full p-5 rounded-3xl border-none shadow-xl outline-none focus:ring-4 focus:ring-indigo-100 font-semibold">
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                                <th class="p-8">Student Detail & Monthly Track</th>
                                <th class="p-8 text-right">Total Fee</th>
                                <th class="p-8 text-right">Paid</th>
                                <th class="p-8 text-right">Balance</th>
                                <th class="p-8 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentList" class="divide-y divide-slate-50 font-semibold">
                            </tbody>
                    </table>
                </div>
                <div id="loader" class="p-20 text-center font-bold text-indigo-300 animate-pulse italic">Connecting to Ledger...</div>
            </div>
        </main>
    </div>

    <div id="printArea" class="print-only p-12 max-w-3xl mx-auto border-4 border-double border-slate-800 rounded-xl m-10">
        <div class="text-center mb-10 border-b-2 border-slate-200 pb-6">
            <h1 class="text-4xl font-black mb-2 tracking-tighter uppercase">Saraswati School</h1>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-[0.3em]">Official Fee Payment Receipt</p>
        </div>
        
        <div class="grid grid-cols-2 gap-8 text-sm mb-10" id="receiptContent">
            </div>

        <div class="border-t-2 pt-8 mb-20">
            <div class="flex justify-between items-center mb-4">
                <span class="font-bold text-slate-500">Current Status:</span>
                <span id="pStatus" class="font-black text-xl"></span>
            </div>
        </div>

        <div class="flex justify-between mt-20">
            <div class="text-center">
                <div class="w-48 border-t border-slate-900 mb-2"></div>
                <p class="text-[10px] font-bold uppercase">Parent's Signature</p>
            </div>
            <div class="text-center">
                <div class="w-48 border-t border-slate-900 mb-2"></div>
                <p class="text-[10px] font-bold uppercase">Accountant Signature</p>
            </div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv&t=" + new Date().getTime();
        let masterData = [];
        const months = ["April", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec", "Jan", "Feb", "March"];

        async function init() {
            try {
                const response = await fetch(sheetURL);
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const tot = parseInt(row['Total Fee']) || 0;
                            const paid = parseInt(row['Paid Fee']) || 0;
                            let monthlyStatus = {};
                            months.forEach(m => { monthlyStatus[m] = parseInt(row[m]) > 0 ? true : false; });
                            return {
                                roll: row['Roll No'] || '-',
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                class: row['Class'] || '-',
                                total: tot,
                                paid: paid,
                                bal: tot - paid,
                                months: monthlyStatus
                            }
                        }).filter(s => s.name.trim() != "");
                        render(masterData);
                    }
                });
            } catch (e) { console.error("Error"); }
        }

        function render(data) {
            const list = document.getElementById('studentList');
            let tPaid = 0, tDue = 0, tCount = 0;

            list.innerHTML = data.map((s, idx) => {
                tPaid += s.paid; tDue += s.bal;
                if(s.paid > 0) tCount++;

                let mHTML = months.map(m => `<span class="month-chip ${s.months[m] ? 'paid' : 'pending'}">${m.substring(0,3)}</span>`).join('');

                return `
                <tr class="hover:bg-indigo-50/50 transition duration-300">
                    <td class="p-8">
                        <div class="text-slate-900 font-bold text-lg leading-tight">${s.name}</div>
                        <div class="text-[10px] text-slate-400 mb-4 font-bold uppercase">S/O ${s.father} | Class ${s.class}</div>
                        <div class="flex flex-wrap gap-1">${mHTML}</div>
                    </td>
                    <td class="p-8 text-right font-bold text-slate-400">₹${s.total}</td>
                    <td class="p-8 text-right text-emerald-600 font-black">₹${s.paid}</td>
                    <td class="p-8 text-right">
                        <div class="text-rose-600 font-black text-xl leading-none">₹${s.bal}</div>
                    </td>
                    <td class="p-8 text-center">
                        <button onclick='printSlip(${JSON.stringify(s)})' class="bg-indigo-50 hover:bg-indigo-600 hover:text-white text-indigo-700 font-bold text-xs p-3 rounded-2xl transition-all border border-indigo-100">
                            📄 Receipt
                        </button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('sumPaid').innerText = "₹" + tPaid.toLocaleString();
            document.getElementById('sumDue').innerText = "₹" + tDue.toLocaleString();
            document.getElementById('activeCount').innerText = tCount;
            document.getElementById('loader').classList.add('hidden');
        }

        function printSlip(s) {
            const content = `
                <div class="space-y-1">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Student Name</p>
                    <p class="text-xl font-black">${s.name}</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Father's Name</p>
                    <p class="text-xl font-black">${s.father}</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Class / Roll No</p>
                    <p class="text-xl font-black">${s.class} / ${s.roll}</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Total Fees</p>
                    <p class="text-xl font-black">₹${s.total}</p>
                </div>
                <div class="space-y-1 bg-slate-50 p-4 rounded-xl">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Total Paid</p>
                    <p class="text-2xl font-black text-emerald-600">₹${s.paid}</p>
                </div>
                <div class="space-y-1 bg-slate-50 p-4 rounded-xl">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Remaining Dues</p>
                    <p class="text-2xl font-black text-rose-600">₹${s.bal}</p>
                </div>
            `;
            document.getElementById('receiptContent').innerHTML = content;
            document.getElementById('pStatus').innerText = s.bal <= 0 ? "FULLY PAID ✅" : "PENDING DUES ❌";
            document.getElementById('pStatus').className = s.bal <= 0 ? "font-black text-xl text-emerald-600" : "font-black text-xl text-rose-600";
            window.print();
        }

        function filterData() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            const filtered = masterData.filter(d => d.name.toLowerCase().includes(v) || d.father.toLowerCase().includes(v));
            render(filtered);
        }

        window.onload = init;
    </script>
</body>
</html>
