<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .print-area { display: none; }
        @media print { 
            .no-print { display: none !important; } 
            .print-active { display: block !important; }
            body { background: white; }
            table { border-collapse: collapse; width: 100%; margin-top: 10px; }
            th, td { border: 1px solid #000 !important; padding: 6px; text-align: left; font-size: 10px; }
            .receipt-box { border: 2px dashed #000; padding: 15px; margin-bottom: 25px; page-break-inside: avoid; border-radius: 15px; }
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="dashboard">
        <nav class="bg-white text-indigo-900 p-6 shadow-xl mb-8 border-b-4 border-indigo-600 no-print">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-5">
                    <img src="logo.PNG" class="w-16 h-16 rounded-full border-4 border-indigo-100 shadow-lg">
                    <div>
                        <h1 class="text-2xl font-black uppercase tracking-tighter leading-none">Khalsa International School</h1>
                        <p class="text-indigo-500 font-bold text-[10px] italic">School Fee Management System</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[10px] font-bold shadow-lg uppercase">🔄 Sync Data</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 no-print">
            <div id="loader" class="text-center p-20 text-xl font-bold text-indigo-500 italic animate-pulse">
                🔄 Database se connect ho raha hai...
            </div>

            <div id="mainUI" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center uppercase">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-blue-500"><p class="text-slate-400 text-[10px] font-bold mb-2">Collected</p><h2 id="sumPaid" class="text-3xl font-black text-indigo-900 italic">₹0</h2></div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-rose-500"><p class="text-rose-400 text-[10px] font-bold mb-2">Pending</p><h2 id="sumDue" class="text-3xl font-black text-rose-600 italic">₹0</h2></div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-emerald-500"><p class="text-emerald-400 text-[10px] font-bold mb-2">Students</p><h2 id="activeCount" class="text-3xl font-black text-emerald-600 italic">0</h2></div>
                </div>

                <div class="mb-10 bg-white p-3 rounded-[2rem] shadow-lg border border-slate-100">
                    <input type="text" id="searchInput" onkeyup="filter()" placeholder="🔍 Student ya Father Name se search karein..." class="w-full p-4 rounded-2xl border-none outline-none font-semibold bg-slate-50 italic">
                </div>

                <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden italic">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead><tr class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black border-b"><th class="p-8">Student Detail</th><th class="p-8 text-right">Balance</th><th class="p-8 text-center uppercase tracking-widest">Actions</th></tr></thead>
                            <tbody id="studentList" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="printArea" class="print-area"></div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv&t=" + new Date().getTime();
        let masterData = [];

        async function init() {
            try {
                const response = await fetch(sheetURL);
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true, skipEmptyLines: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const clean = (v) => parseInt(String(v || 0).replace(/\D/g,'')) || 0;
                            return {
                                name: row['Name'] || '', father: row['Father Name'] || '',
                                class: row['Class'] || '', paid: clean(row['Paid Fee']),
                                total: clean(row['Total Fee']), bal: clean(row['Total Fee']) - clean(row['Paid Fee']),
                                lastAmt: clean(row['Last Amount'])
                            };
                        }).filter(s => s.name);
                        
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('mainUI').classList.remove('hidden');
                        render(masterData);
                    }
                });
            } catch (e) { alert("Data load nahi ho pa raha. Check Sheet Publish status."); }
        }

        function render(data) {
            const list = document.getElementById('studentList');
            let tP = 0, tD = 0;
            list.innerHTML = data.map(s => {
                tP += s.paid; tD += s.bal;
                return `<tr class="border-b"><td class="p-8"><div><span class="font-bold text-lg uppercase italic">${s.name}</span></div><div class="text-[9px] text-slate-400 font-bold uppercase">S/O ${s.father} | ${s.class}</div></td><td class="p-8 text-right font-black text-rose-600 text-lg italic">₹${s.bal}</td><td class="p-8 text-center"><button onclick='printSlip(${JSON.stringify(s)})' class="bg-indigo-600 text-white text-[9px] px-4 py-2 rounded-lg uppercase italic font-bold">📄 Receipt</button></td></tr>`;
            }).join('');
            document.getElementById('sumPaid').innerText = "₹" + tP.toLocaleString();
            document.getElementById('sumDue').innerText = "₹" + tD.toLocaleString();
            document.getElementById('activeCount').innerText = data.length;
        }

        function filter() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = masterData.filter(d => d.name.toLowerCase().includes(val) || d.father.toLowerCase().includes(val));
            render(filtered);
        }

        function printSlip(s) {
            const area = document.getElementById('printArea');
            area.innerHTML = `
                <div class="print-active">
                    <div class="receipt-box"><p class="font-black text-xl uppercase">Parent Copy - ${s.name}</p><p>Balance: ₹${s.bal}</p></div>
                    <div class="receipt-box"><p class="font-black text-xl uppercase">Office Copy - ${s.name}</p><p>Balance: ₹${s.bal}</p></div>
                </div>`;
            window.print();
        }

        window.onload = init;
    </script>
</body>
</html>
