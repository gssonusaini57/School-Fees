<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa School - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .print-area { display: none; }
        @media print { 
            .no-print { display: none !important; } 
            .print-active { display: block !important; }
            body { background: white; padding: 0; }
            .receipt-box { border: 2px dashed #000; padding: 20px; margin-bottom: 30px; border-radius: 15px; position: relative; page-break-inside: avoid; }
            .watermark-print { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); width: 250px; opacity: 0.05; z-index: -1; }
            table { border-collapse: collapse; width: 100%; border: 1px solid #000; margin-top: 10px; }
            th, td { border: 1px solid #000 !important; padding: 6px; font-size: 11px; }
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="dashboard">
        <nav class="bg-white p-6 shadow-xl mb-8 border-b-4 border-indigo-600 no-print">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="logo.PNG" class="w-14 h-14 rounded-full border shadow-sm" onerror="this.src='https://via.placeholder.com/60'">
                    <div>
                        <h1 class="text-xl font-black uppercase text-indigo-900 leading-none tracking-tighter">Khalsa School</h1>
                        <p class="text-indigo-500 font-bold text-[9px] italic uppercase tracking-widest italic">Management Portal</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openAddModal()" class="bg-emerald-600 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">➕ New Student</button>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">🔄 Sync Data</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 no-print">
            <div id="loader" class="p-20 text-center font-bold text-indigo-400 animate-pulse italic text-xl uppercase">Connecting to Database...</div>
            
            <div id="mainContent" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-white p-3 rounded-3xl shadow-lg italic">
                    <select id="classSelect" onchange="applyFilters()" class="p-4 rounded-2xl border-none font-bold text-indigo-600 bg-indigo-50"><option value="All">All Classes</option></select>
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search Name..." class="p-4 rounded-2xl border-none outline-none font-bold bg-slate-50">
                    <button id="classReportBtn" onclick="printClassReport()" class="hidden bg-rose-600 text-white p-4 rounded-2xl font-black uppercase italic shadow-md">🖨️ Class Report</button>
                </div>

                <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden italic">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black border-b">
                                <th class="p-6">Student Details</th>
                                <th class="p-6 text-right">Balance</th>
                                <th class="p-6 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentList" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="feeModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-black text-indigo-900 mb-2 uppercase italic text-center underline">Update Fee</h2>
            <p id="targetStudent" class="text-indigo-500 font-bold text-center mb-6 uppercase italic border-b pb-2"></p>
            <input type="number" id="feeAmount" placeholder="Amount (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border-2
