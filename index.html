<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Management - Monthly Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto p-6">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-indigo-900 italic">Fee Management System</h1>
            <p id="connStatus" class="text-orange-500 font-bold mt-2">Connecting to Excel...</p>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchBox" onkeyup="filterData()" placeholder="Student ya Father Name search karein..." 
                   class="flex-1 p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            <select id="classFilter" onchange="filterData()" class="p-4 bg-gray-50 border rounded-2xl outline-none font-semibold">
                <option value="All">All Classes</option>
                <option value="Nursery">Nursery</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-indigo-900 text-white uppercase text-xs tracking-widest">
                            <th class="p-5">Roll No</th>
                            <th class="p-5">Student Name</th>
                            <th class="p-5 text-indigo-200 font-black">Father's Name</th>
                            <th class="p-5">Class</th>
                            <th class="p-5 text-right">Total Fee</th>
                            <th class="p-5 text-right text-green-300">Paid Amount</th>
                            <th class="p-5 text-right text-red-300">Pending Balance</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-100 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        let masterData = [];

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const csvData = await response.text();
                
                Papa.parse(csvData, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        masterData = results.data.map(row => {
                            const total = parseInt(String(row['Total Fee']).replace(/\D/g,'')) || 0;
                            const paid = parseInt(String(row['Paid Fee']).replace(/\D/g,'')) || 0;
                            
                            return {
                                roll: row['Roll No'] || 'N/A',
                                name: row['Name'] || 'Unknown',
                                father: row['Father Name'] || 'Not Mentioned',
                                class: row['Class'] || 'N/A',
                                total: total,
                                paid: paid,
                                balance: total - paid // Automatic Calculation
                            };
                        }).filter(s => s.name !== 'Unknown');

                        document.getElementById('connStatus').innerText = "🟢 Live: Excel se Connected";
                        document.getElementById('connStatus').className = "text-green-600 font-bold mt-2";
                        renderTable(masterData);
                    }
                });
            } catch (error) {
                document.getElementById('connStatus').innerText = "🔴 Error: Link check karein";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-5 font-bold text-gray-400">${s.roll}</td>
                    <td class="p-5 font-bold text-gray-800">${s.name}</td>
                    <td class="p-5 text-indigo-600 font-semibold italic">${s.father}</td>
                    <td class="p-5"><span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold">${s.class}</span></td>
                    <td class="p-5 text-right text-gray-500">₹${s.total.toLocaleString()}</td>
                    <td class="p-5 text-right text-green-600 font-black">₹${s.paid.toLocaleString()}</td>
                    <td class="p-5 text-right">
                        <span class="${s.balance > 0 ? 'bg-red-100 text-red-700 px-4 py-2 rounded-xl font-black' : 'text-gray-300'}">
                            ₹${s.balance.toLocaleString()}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const classVal = document.getElementById('classFilter').value;
            const filtered = masterData.filter(s => 
                (s.name.toLowerCase().includes(search) || s.father.toLowerCase().includes(search)) && 
                (classVal === "All" || s.class === classVal)
            );
            renderTable(filtered);
        }

        window.onload = loadData;
    </script>
</body>
</html>
