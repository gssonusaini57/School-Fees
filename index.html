<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .print-area { display: none; }
        @media print { 
            .no-print { display: none !important; } 
            .print-active { display: block !important; }
            body { background: white; padding: 0; }
            table { border-collapse: collapse; width: 100%; border: 1px solid #000; }
            th, td { border: 1px solid #000 !important; padding: 8px; text-align: left; font-size: 11px; }
            .receipt-box { border: 2px dashed #000; padding: 25px; margin-bottom: 30px; border-radius: 15px; position: relative; }
            .watermark-print { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); width: 400px; opacity: 0.05; z-index: -1; }
        }
    </style>
</head>
<body class="antialiased">

    <div id="dashboard">
        <nav class="bg-white p-6 shadow-xl mb-8 border-b-4 border-indigo-600 no-print">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="logo.PNG" class="w-14 h-14 rounded-full border shadow-sm" onerror="this.src='https://via.placeholder.com/60'">
                    <div>
                        <h1 class="text-xl font-black uppercase text-indigo-900 leading-none tracking-tighter">Khalsa School</h1>
                        <p class="text-indigo-500 font-bold text-[9px] italic">Admin Dashboard v3.0</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openAddModal()" class="bg-emerald-600 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">➕ New Student</button>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">🔄 Sync</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 no-print">
            <div id="loader" class="p-20 text-center font-bold text-indigo-400 animate-pulse italic text-xl uppercase tracking-widest">🔄 Connecting to Database...</div>
            
            <div id="mainContent" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 text-center italic font-bold">
                    <div class="bg-white p-6 rounded-3xl border-b-4 border-blue-500">Total Collected<h2 id="sumPaid" class="text-2xl font-black text-indigo-900 italic">₹0</h2></div>
                    <div class="bg-white p-6 rounded-3xl border-b-4 border-rose-500">Total Dues<h2 id="sumDue" class="text-2xl font-black text-rose-600 italic">₹0</h2></div>
                    <div class="bg-white p-6 rounded-3xl border-b-4 border-emerald-500">Active Students<h2 id="activeCount" class="text-2xl font-black text-emerald-600 italic">0</h2></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-white p-3 rounded-3xl shadow-lg items-center italic">
                    <div class="md:col-span-1"><select id="classSelect" onchange="applyFilters()" class="w-full p-4 rounded-2xl border-none font-bold text-indigo-600 bg-indigo-50"><option value="All">All Classes</option></select></div>
                    <div class="md:col-span-1"><input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search Name..." class="w-full p-4 rounded-2xl border-none outline-none font-bold bg-slate-50 italic"></div>
                    <div class="md:col-span-1"><button id="classReportBtn" onclick="printClassReport()" class="hidden w-full bg-rose-600 text-white p-4 rounded-2xl font-black uppercase italic shadow-md">🖨️ Class Report</button></div>
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden italic">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black border-b tracking-widest">
                                    <th class="p-8">Student Info</th>
                                    <th class="p-8 text-right">Balance</th>
                                    <th class="p-8 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="studentList" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="manageModal" class="fixed inset-0 bg-black/60 z-[120] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-lg">
            <h2 class="text-2xl font-black text-indigo-900 mb-6 uppercase italic">Student Registration</h2>
            <div class="space-y-4">
                <input type="text" id="mName" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none font-bold">
                <input type="text" id="mFather" placeholder="Father Name" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none font-bold">
                <input type="text" id="mClass" placeholder="Class" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none font-bold">
                <input type="number" id="mTotalFee" placeholder="Yearly Fee (₹)" class="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl font-black text-indigo-700 text-xl outline-none">
                <div class="flex gap-3 pt-4 font-bold">
                    <button onclick="closeManageModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl italic">CANCEL</button>
                    <button id="saveBtn" onclick="submitNewStudent()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl shadow-lg italic">SAVE TO SHEET</button>
                </div>
            </div>
        </div>
    </div>

    <div id="feeModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-black text-indigo-900 mb-2 uppercase italic text-center underline">Update Fee</h2>
            <p id="targetStudent" class="text-indigo-500 font-bold text-center mb-6 uppercase italic border-b pb-2"></p>
            <input type="number" id="feeAmount" placeholder="Amount (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-lg mb-4 outline-none">
            <select id="feeMonth" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold mb-6">
                <option value="April">April</option><option value="May">May</option><option value="June">June</option>
                <option value="July">July</option><option value="Aug">Aug</option><option value="Sept">Sept</option>
                <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
                <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="March">March</option>
            </select>
            <div class="flex gap-3">
                <button onclick="closeFeeModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold">BACK</button>
                <button id="feeSubmitBtn" onclick="submitFee()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">UPDATE NOW</button>
            </div>
        </div>
    </div>

    <div id="printArea" class="print-area"><div id="printContent"></div></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlHFYV0reRa09njTrq9GYbcgbRKL8gNLmU4-iUsoIjpFxuflBGOYP4bgyhXknQD-gN/exec";
        const sheetURL = "
