<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
    </style>
</head>
<body>

    <nav class="bg-indigo-950 text-white p-6 shadow-xl mb-10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">FEES PANEL</h1>
            <div id="status" class="text-[10px] font-bold uppercase bg-white/10 px-3 py-1 rounded-full">Connecting...</div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-blue-600">
                <p class="text-gray-400 text-xs font-bold uppercase">Total Fee</p>
                <h2 id="totalFee" class="text-3xl font-black text-slate-800">₹0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-green-600">
                <p class="text-green-600 text-xs font-bold uppercase">Collected</p>
                <h2 id="totalPaid" class="text-3xl font-black text-green-600">₹0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-red-600">
                <p class="text-red-600 text-xs font-bold uppercase">Pending</p>
                <h2 id="totalPending" class="text-3xl font-black text-red-600">₹0</h2>
            </div>
        </div>

        <div class="mb-8">
            <input type="text" id="search" onkeyup="searchData()" placeholder="Student Name search karein..." 
                   class="w-full p-5 rounded-2xl border-none shadow-lg outline-none focus:ring-4 focus:ring-indigo-200">
        </div>

        <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-100">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                        <th class="p-6">Roll No</th>
                        <th class="p-6">Student Name</th>
                        <th class="p-6">Father Name</th>
                        <th class="p-6 text-right">Total</th>
                        <th class="p-6 text-right">Paid</th>
                        <th class="p-6 text-right">Balance</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-50 text-sm font-bold text-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // CORRECTED PUBLISHED LINK
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(url);
                if(!response.ok) throw new Error("404");
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        allData = results.data.map(row => {
                            const total = parseInt(row['Total Fee']) || 0;
                            const paid = parseInt(row['Paid Fee']) || 0;
                            return {
                                roll: row['Roll No'] || '-',
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                total: total,
                                paid: paid,
                                balance: total - paid
                            };
                        }).filter(s => s.name != "");

                        document.getElementById('status').innerText = "🟢 Connected";
                        updateDisplay(allData);
                    }
                });
            } catch (e) {
                document.getElementById('status').innerText = "🔴 Link Error (Check Publish Settings)";
            }
        }

        function updateDisplay(data) {
            const body = document.getElementById('tableBody');
            let sumTotal = 0, sumPaid = 0, sumBal = 0;
            
            body.innerHTML = data.map(s => {
                sumTotal += s.total; sumPaid += s.paid; sumBal += s.balance;
                return `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-6 text-slate-300 font-mono">${s.roll}</td>
                    <td class="p-6 text-indigo-950 font-black">${s.name}</td>
                    <td class="p-6 text-slate-400 italic font-medium">${s.father}</td>
                    <td class="p-6 text-right text-slate-400 italic">₹${s.total}</td>
                    <td class="p-6 text-right text-green-600 font-black">₹${s.paid}</td>
                    <td class="p-6 text-right">
                        <span class="${s.balance > 0 ? 'bg-red-50 text-red-600 px-4 py-2 rounded-xl' : 'text-slate-200'}">₹${s.balance}</span>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('totalFee').innerText = "₹" + sumTotal.toLocaleString();
            document.getElementById('totalPaid').innerText = "₹" + sumPaid.toLocaleString();
            document.getElementById('totalPending').innerText = "₹" + sumBal.toLocaleString();
        }

        function searchData() {
            const val = document.getElementById('search').value.toLowerCase();
            const filtered = allData.filter(s => s.name.toLowerCase().includes(val) || s.father.toLowerCase().includes(val));
            updateDisplay(filtered);
        }

        window.onload = loadData;
    </script>
</body>
</html>
