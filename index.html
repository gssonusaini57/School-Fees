<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School - Ultimate Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .print-area { display: none; }
        @media print { 
            .no-print { display: none !important; } 
            .print-active { display: block !important; }
            body { background: white; padding: 0; }
            .receipt-card { border: 2px solid #000; padding: 20px; margin-bottom: 25px; border-radius: 12px; page-break-inside: avoid; position: relative; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
            th, td { border: 1px solid #000; padding: 8px; text-align: left; }
            .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); opacity: 0.05; width: 300px; z-index: -1; }
        }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="dashboard">
        <nav class="bg-white p-6 shadow-md mb-8 border-b-4 border-indigo-600 no-print">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <img src="logo.PNG" class="w-14 h-14 rounded-full border shadow-sm" onerror="this.src='https://via.placeholder.com/60'">
                    <div>
                        <h1 class="text-xl font-black text-indigo-900 uppercase leading-none">Khalsa School</h1>
                        <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Master Admin Portal 2026</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openAddModal()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-lg uppercase">➕ Add Student</button>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-lg uppercase">🔄 Sync Data</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 no-print">
            <div id="loader" class="p-20 text-center font-bold text-indigo-400 animate-pulse text-xl uppercase italic">🔄 Connecting to Database...</div>
            
            <div id="mainContent" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-white p-3 rounded-3xl shadow-lg font-bold italic">
                    <select id="classSelect" onchange="applyFilters()" class="p-4 rounded-2xl border-none text-indigo-600 bg-indigo-50 outline-none"><option value="All">All Classes</option></select>
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search Name or Phone..." class="w-full p-4 rounded-2xl border-none outline-none bg-slate-50">
                    <button id="classReportBtn" onclick="printClassReport()" class="hidden bg-rose-600 text-white p-4 rounded-2xl font-black uppercase italic shadow-md">🖨️ Class Report</button>
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left italic">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-[10px] uppercase font-black border-b">
                                    <th class="p-6">Student Info</th>
                                    <th class="p-6 text-right">Dues (₹)</th>
                                    <th class="p-6 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="studentList" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="manageModal" class="fixed inset-0 bg-black/70 z-[150] hidden items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <h2 id="modalTitle" class="text-2xl font-black text-indigo-900 mb-6 uppercase italic">Student Management</h2>
            <div class="space-y-4 font-bold">
                <input type="hidden" id="editOldName">
                <input type="text" id="mName" placeholder="Student Full Name" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none">
                <input type="text" id="mFather" placeholder="Father's Name" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="mClass" placeholder="Class" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none">
                    <input type="text" id="mPhone" placeholder="Mobile Number" class="w-full p-4 bg-indigo-50 border-2 border-indigo-200 rounded-2xl outline-none font-black text-indigo-700">
                </div>
                <input type="number" id="mTotalFee" placeholder="Total Yearly Fee (₹)" class="w-full p-4 bg-slate-100 rounded-2xl font-black text-xl outline-none">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeManageModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold uppercase">Cancel</button>
                    <button id="saveBtn" onclick="submitStudentData()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl shadow-lg font-black uppercase">Save Student</button>
                </div>
            </div>
        </div>
    </div>

    <div id="feeModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-black text-indigo-900 mb-4 text-center italic uppercase underline">Fee Update</h2>
            <p id="targetStudent" class="text-indigo-500 font-black text-center mb-6 uppercase border-b pb-2"></p>
            <input type="number" id="feeAmount" placeholder="Enter Amount (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 font-black text-xl mb-4 outline-none border-indigo-100">
            <select id="feeMonth" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold mb-6 outline-none">
                <option value="April">April</option><option value="May">May</option><option value="June">June</option>
                <option value="July">July</option><option value="Aug">Aug</option><option value="Sept">Sept</option>
                <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
                <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="March">March</option>
            </select>
            <div class="flex gap-3">
                <button onclick="closeFeeModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold uppercase">Back</button>
                <button id="feeSubmitBtn" onclick="submitFee()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl shadow-lg font-black uppercase">Pay Now</button>
            </div>
        </div>
    </div>

    <div id="printArea" class="print-active hidden p-10"><div id="printContent"></div></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlHFYV0reRa09njTrq9GYbcgbRKL8gNLmU4-iUsoIjpFxuflBGOYP4bgyhXknQD-gN/exec";
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        
        let masterData = [];
        let filteredData = [];
        const mArr = ["April", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec", "Jan", "Feb", "March"];

        async function init() {
            try {
                const response = await fetch(sheetURL + "&t=" + Date.now());
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true, skipEmptyLines: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const cln = (v) => parseInt(String(v || 0).replace(/\D/g,'')) || 0;
                            let mD = {}; mArr.forEach(m => mD[m] = cln(row[m]));
                            return { 
                                name: row['Name'], father: row['Father Name'], class: row['Class'], 
                                phone: row['Phone'] || '', total: cln(row['Total Fee']), 
                                paid: cln(row['Paid Fee']), bal: cln(row['Total Fee']) - cln(row['Paid Fee']),
                                lastAmt: cln(row['Last Amount']), months: mD
                            };
                        }).filter(s => s.name);
                        populateClassFilter();
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('mainContent').classList.remove('hidden');
                        renderTable(masterData);
                    }
                });
            } catch (e) { alert("Offline!"); }
        }

        function renderTable(data) {
            const list = document.getElementById('studentList');
            list.innerHTML = data.map((s) => `
                <tr class="border-b hover:bg-indigo-50/20 transition-all">
                    <td class="p-6">
                        <div class="font-black text-indigo-950 uppercase italic text-lg leading-tight">${s.name}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter mt-1">S/O ${s.father} | ${s.class} | 📞 ${s.phone}</div>
                    </td>
                    <td class="p-6 text-right font-black text-rose-600 text-lg">₹${s.bal}</td>
                    <td class="p-6 text-center flex flex-wrap gap-1 justify-center">
                        <button onclick='openFeeModal(${JSON.stringify(s)})' class="bg-indigo-900 text-white text-[7px] px-3 py-2 rounded-lg font-black uppercase shadow hover:bg-indigo-700">➕ Fee</button>
                        <button onclick='openEditModal(${JSON.stringify(s)})' class="bg-blue-600 text-white text-[7px] px-3 py-2 rounded-lg font-black uppercase shadow hover:bg-blue-700">✏️ Edit</button>
                        <button onclick='printLedger(${JSON.stringify(s)})' class="bg-emerald-600 text-white text-[7px] px-3 py-2 rounded-lg font-black uppercase shadow hover:bg-emerald-700">📂 Ledger</button>
                        <button onclick='printReceipt(${JSON.stringify(s)})' class="bg-rose-500 text-white text-[7px] px-3 py-2 rounded-lg font-black uppercase shadow hover:bg-rose-700">📄 Receipt</button>
                    </td>
                </tr>`).join('');
        }

        // ADD/EDIT STUDENT
        function openAddModal() { document.getElementById('modalTitle').innerText = "Register Student"; document.getElementById('editOldName').value = ""; document.getElementById('mName').value = ""; document.getElementById('mFather').value = ""; document.getElementById('mClass').value = ""; document.getElementById('mPhone').value = ""; document.getElementById('mTotalFee').value = ""; document.getElementById('manageModal').classList.remove('hidden'); }
        function openEditModal(s) { document.getElementById('modalTitle').innerText = "Edit Student"; document.getElementById('editOldName').value = s.name; document.getElementById('mName').value = s.name; document.getElementById('mFather').value = s.father; document.getElementById('mClass').value = s.class; document.getElementById('mPhone').value = s.phone; document.getElementById('mTotalFee').value = s.total; document.getElementById('manageModal').classList.remove('hidden'); }
        function closeManageModal() { document.getElementById('manageModal').classList.add('hidden'); }
        async function submitStudentData() {
            const btn = document.getElementById('saveBtn');
            const payload = { action: document.getElementById('editOldName').value ? "update" : "add", oldName: document.getElementById('editOldName').value, name: document.getElementById('mName').value, father: document.getElementById('mFather').value, class: document.getElementById('mClass').value, phone: document.getElementById('mPhone').value, totalFee: document.getElementById('mTotalFee').value };
            btn.innerText = "Processing..."; btn.disabled = true;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Success!"); location.reload();
        }

        // FEE ENTRY
        let curS;
        function openFeeModal(s) { curS = s; document.getElementById('targetStudent').innerText = s.name; document.getElementById('feeModal').classList.remove('hidden'); }
        function closeFeeModal() { document.getElementById('feeModal').classList.add('hidden'); }
        async function submitFee() {
            const btn = document.getElementById('feeSubmitBtn');
            btn.innerText = "UPDATING..."; btn.disabled = true;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "fee", name: curS.name, amount: document.getElementById('feeAmount').value, month: document.getElementById('feeMonth').value }) });
            alert("Fees Updated!"); location.reload();
        }

        // PRINTING LOGIC
        function printLedger(s) {
            let table = mArr.map(m => `<tr><td>${m}</td><td>₹${s.months[m] || 0}</td></tr>`).join('');
            document.getElementById('printContent').innerHTML = `
                <div class="receipt-card">
                    <img src="logo.PNG" class="watermark" onerror="this.style.display='none'">
                    <h2 style="text-align:center; font-weight:900; margin:0">KHALSA INTERNATIONAL SCHOOL</h2>
                    <p style="text-align:center; font-size:10px; font-weight:bold">Monthly Fee Ledger (2025-26)</p><hr>
                    <div style="font-size:12px; margin-bottom:10px"><b>Student:</b> ${s.name} | <b>Father:</b> ${s.father}<br><b>Class:</b> ${s.class} | 📞 ${s.phone}</div>
                    <table><thead><tr style="background:#f4f4f4"><th>Month Name</th><th>Fee Received</th></tr></thead><tbody>${table}</tbody>
                    <tfoot><tr style="font-weight:bold"><td>Total Paid</td><td>₹${s.paid}</td></tr><tr style="color:red; font-weight:bold"><td>Total Dues</td><td>₹${s.bal}</td></tr></tfoot></table>
                </div>`;
            window.print();
        }

        function printReceipt(s) {
            const body = `<div class="receipt-card"><h2 style="text-align:center; font-weight:900; margin:0">KHALSA INTERNATIONAL SCHOOL</h2><p style="text-align:center; font-size:10px; font-weight:bold">FEE RECEIPT</p><hr><div style="font-size:13px; line-height:2"><b>STUDENT:</b> ${s.name}<br><b>CLASS:</b> ${s.class} | 📞 ${s.phone}<p style="background:#f4f4f4; padding:15px; font-size:20px; font-weight:900; text-align:center">AMOUNT: ₹${s.lastAmt}</p><p style="text-align:right; font-weight:bold; color:red">CURRENT BALANCE: ₹${s.bal}</p></div></div>`;
            document.getElementById('printContent').innerHTML = `<p style="text-align:center; font-size:8px">-- OFFICE COPY --</p>${body}<p style="text-align:center; font-size:8px">-- PARENT COPY --</p>${body}`;
            window.print();
        }

        function printClassReport() {
            const cV = document.getElementById('classSelect').value;
            let totalDues = 0;
            let rows = filteredData.map(s => { totalDues += s.bal; return `<tr><td>${s.name}</td><td>${s.phone}</td><td>₹${s.total}</td><td>₹${s.paid}</td><td>₹${s.bal}</td></tr>`; }).join('');
            document.getElementById('printContent').innerHTML = `<div class="receipt-card"><h2 style="text-align:center; font-weight:900">CLASS ${cV} FEE REPORT</h2><table><thead><tr style="background:#eee"><th>Name</th><th>Phone</th><th>Yearly Fee</th><th>Paid</th><th>Dues</th></tr></thead><tbody>${rows}</tbody></table><h3 style="text-align:right; font-weight:900">Total Pending Dues: ₹${totalDues.toLocaleString()}</h3></div>`;
            window.print();
        }

        function populateClassFilter() {
            const classSelect = document.getElementById('classSelect');
            const uniqueClasses = [...new Set(masterData.map(s => s.class))].sort();
            uniqueClasses.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.innerText = "Class: " + c; classSelect.appendChild(opt); });
        }
        function applyFilters() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const cV = document.getElementById('classSelect').value;
            filteredData = masterData.filter(d => (d.name.toLowerCase().includes(val) || d.phone.includes(val)) && (cV === "All" || d.class === cV));
            document.getElementById('classReportBtn').classList.toggle('hidden', cV === "All");
            renderTable(filteredData);
        }
        window.onload = init;
    </script>
</body>
</html>
