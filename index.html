<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fees Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto p-4 md:p-10">
        <header class="bg-blue-900 text-white p-8 rounded-3xl shadow-2xl mb-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold italic tracking-tight">Saraswati School Fee System</h1>
                <div id="status" class="mt-2 text-blue-300 font-bold text-xs uppercase tracking-widest flex items-center gap-2">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span></span>
                    Connecting to Excel...
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.reload()" class="bg-blue-700 hover:bg-blue-600 px-6 py-2 rounded-xl text-sm font-bold transition">🔄 Refresh Page</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
            <div class="md:col-span-2">
                <input type="text" id="searchBox" onkeyup="filterData()" placeholder="Student Name ya Father Name se search karein..." 
                       class="w-full p-5 rounded-2xl shadow-sm border-none outline-none focus:ring-4 focus:ring-blue-100 text-gray-700">
            </div>
            <select id="classFilter" onchange="filterData()" class="p-5 rounded-2xl shadow-sm outline-none font-bold text-gray-500 bg-white">
                <option value="All">All Classes</option>
                <option value="Nursery">Nursery</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
                <option value="1st">1st Class</option>
            </select>
        </div>

        <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-gray-400 text-[11px] uppercase font-black tracking-widest">
                            <th class="p-6">Roll No</th>
                            <th class="p-6 text-blue-900">Student Name</th>
                            <th class="p-6">Father Name</th>
                            <th class="p-6">Class</th>
                            <th class="p-6 text-right">Total Fee</th>
                            <th class="p-6 text-right text-green-600">Paid Amount</th>
                            <th class="p-6 text-right text-red-600">Pending</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-50 text-sm font-semibold text-gray-700">
                        </tbody>
                </table>
            </div>
            <div id="noData" class="hidden p-20 text-center text-gray-300 italic">Koi student nahi mila!</div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        let masterData = [];

        async function loadData() {
            const statusBox = document.getElementById('status');
            try {
                const response = await fetch(sheetURL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        masterData = results.data.map(row => {
                            // Cleaning numbers from any symbols like ₹ or commas
                            const total = parseInt(String(row['Total Fee'] || 0).replace(/\D/g,'')) || 0;
                            const paid = parseInt(String(row['Paid Fee'] || 0).replace(/\D/g,'')) || 0;
                            
                            return {
                                roll: row['Roll No'] || '-',
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                class: row['Class'] || '-',
                                total: total,
                                paid: paid,
                                balance: total - paid
                            };
                        }).filter(s => s.name.trim() !== "");

                        statusBox.innerHTML = "🟢 Live: Data Synced with Excel";
                        statusBox.className = "mt-2 text-green-500 font-bold text-xs uppercase tracking-widest";
                        renderTable(masterData);
                    }
                });
            } catch (err) {
                statusBox.innerHTML = "🔴 Connection Error: Sheet Check Karein";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            const noData = document.getElementById('noData');
            
            if(data.length === 0) {
                noData.classList.remove('hidden');
                tbody.innerHTML = "";
                return;
            }
            noData.classList.add('hidden');
            
            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-blue-50/50 transition duration-200">
                    <td class="p-6 font-bold text-gray-400">${s.roll}</td>
                    <td class="p-6 font-bold text-gray-900">${s.name}</td>
                    <td class="p-6 text-blue-600 italic">${s.father}</td>
                    <td class="p-6"><span class="bg-gray-100 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">${s.class}</span></td>
                    <td class="p-6 text-right font-bold text-gray-500">₹${s.total.toLocaleString()}</td>
                    <td class="p-6 text-right text-green-600 font-black">₹${s.paid.toLocaleString()}</td>
                    <td class="p-6 text-right">
                        <span class="${s.balance > 0 ? 'bg-red-50 text-red-600 px-4 py-2 rounded-xl font-black' : 'text-gray-300 font-normal'}">
                            ₹${s.balance.toLocaleString()}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const classVal = document.getElementById('classFilter').value;
            const filtered = masterData.filter(s => 
                (s.name.toLowerCase().includes(search) || s.father.toLowerCase().includes(search)) && 
                (classVal === "All" || s.class === classVal)
            );
            renderTable(filtered);
        }

        window.onload = loadData;
    </script>
</body>
</html>
