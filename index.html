<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School - Full Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .print-area { display: none; }
        @media print { 
            .no-print { display: none !important; } 
            .print-active { display: block !important; }
            body { background: white; padding: 0; }
            table { border-collapse: collapse; width: 100%; margin-top: 10px; position: relative; z-index: 10; background: transparent !important; }
            th, td { border: 1px solid #000 !important; padding: 6px; text-align: left; font-size: 10px; background: transparent !important; }
            .watermark-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); width: 300px; opacity: 0.1 !important; z-index: -1; }
            .receipt-box { border: 2px dashed #000; padding: 15px; margin-bottom: 25px; page-break-inside: avoid; border-radius: 15px; position: relative; }
            .signature-img { width: 80px; position: absolute; bottom: 30px; right: 40px; opacity: 0.8; }
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="feeModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-black text-indigo-900 mb-2 uppercase italic tracking-tighter">Add Fee Entry</h2>
            <p id="targetStudent" class="text-indigo-500 font-bold text-sm mb-6 border-b pb-2 italic"></p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-2">Amount (₹)</label>
                    <input type="number" id="feeAmount" placeholder="Enter Amount" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-4 focus:ring-indigo-100 font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-2">For Month</label>
                    <select id="feeMonth" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-4 focus:ring-indigo-100 font-bold">
                        <option value="April">April</option><option value="May">May</option><option value="June">June</option>
                        <option value="July">July</option><option value="Aug">Aug</option><option value="Sept">Sept</option>
                        <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
                        <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="March">March</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl active:scale-95 transition-all">CANCEL</button>
                    <button id="submitBtn" onclick="submitFee()" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">SUBMIT</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div class="no-print">
            <nav class="bg-white text-indigo-900 p-6 shadow-xl mb-8 border-b-4 border-indigo-600">
                <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="flex items-center gap-5">
                        <img src="logo.PNG" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=KIS'" class="w-16 h-16 rounded-full border-4 border-indigo-100 shadow-lg">
                        <div>
                            <h1 class="text-2xl font-black uppercase tracking-tighter leading-none">Khalsa International School</h1>
                            <p class="text-indigo-500 font-bold text-[10px] italic">Fee Management System</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="classReportBtn" onclick="printClassReport()" class="hidden bg-rose-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic tracking-widest">Class List</button>
                        <button onclick="location.reload()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">🔄 Refresh</button>
                    </div>
                </div>
            </nav>

            <main class="max-w-7xl mx-auto px-4 pb-20">
                <div id="loader" class="p-20 text-center font-bold text-indigo-400 animate-pulse italic text-xl">
                    🔄 Syncing with Google Sheets...
                </div>
                
                <div id="mainContent" class="hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center uppercase italic">
                        <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-blue-500"><p class="text-slate-400 text-[10px] font-bold mb-2">Collected</p><h2 id="sumPaid" class="text-3xl font-black text-indigo-900 italic">₹0</h2></div>
                        <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-rose-500"><p class="text-rose-400 text-[10px] font-bold mb-2">Pending</p><h2 id="sumDue" class="text-3xl font-black text-rose-600 italic">₹0</h2></div>
                        <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-emerald-500"><p class="text-emerald-400 text-[10px] font-bold mb-2">Students</p><h2 id="activeCount" class="text-3xl font-black text-emerald-600 italic">0</h2></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 bg-white p-3 rounded-[2rem] shadow-lg border border-slate-100 italic">
                        <div class="md:col-span-2"><input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search Student..." class="w-full p-4 rounded-2xl border-none outline-none font-semibold bg-slate-50 italic"></div>
                        <div><select id="classSelect" onchange="applyFilters()" class="w-full p-4 rounded-2xl border-none font-bold text-indigo-600 bg-indigo-50 italic"><option value="All">All Classes</option></select></div>
                    </div>

                    <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden italic">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead><tr class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black border-b"><th class="p-8">Student Detail</th><th class="p-8 text-right">Balance</th><th class="p-8 text-center uppercase tracking-widest italic">Management</th></tr></thead>
                                <tbody id="studentList" class="divide-y divide-slate-50"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="printAreaSingle" class="print-area">
        </div>
    <div id="printYearlyLedger" class="print-area"><img src="logo.PNG" class="watermark-bg"><div id="ledgerStudentInfo"></div><table><tbody id="ledgerTableBody"></tbody></table></div>
    <div id="classReportPrint" class="print-area"><div id="reportContent"></div></div>

    <script>
        // SCRIPT CONFIG
        const scriptURL = "https://script.google.com/macros/s/AKfycbwR73jtVS4BXx0AE9bFWjfrMExi38e3NJGDTlH0eV8YjLgMPieJVrchWGIHiEHtPtpy/exec";
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv&t=" + new Date().getTime();
        
        let masterData = [];
        let filteredData = [];
        let selectedStudent = null;
        const months = ["April", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec", "Jan", "Feb", "March"];

        async function init() {
            try {
                const response = await fetch(sheetURL);
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true, skipEmptyLines: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const clean = (v) => parseInt(String(v || 0).replace(/\D/g,'')) || 0;
                            let monthData = {};
                            months.forEach(m => monthData[m] = clean(row[m]));
                            return { 
                                roll: row['Roll No'], name: row['Name'], father: row['Father Name'], 
                                class: row['Class'], phone: row['Phone No'] || 'No Phone',
                                total: clean(row['Total Fee']), paid: clean(row['Paid Fee']), 
                                bal: clean(row['Total Fee']) - clean(row['Paid Fee']), lastAmt: clean(row['Last Amount']),
                                allMonths: monthData
                            };
                        }).filter(s => s.name);
                        populateClassFilter();
                        applyFilters();
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('mainContent').classList.remove('hidden');
                    }
                });
            } catch (e) { console.log(e); }
        }

        function renderTable(data) {
            const list = document.getElementById('studentList');
            let tP = 0, tD = 0;
            list.innerHTML = data.map((s) => {
                tP += s.paid; tD += s.bal;
                return `<tr class="border-b transition hover:bg-indigo-50/30"><td class="p-8"><div><span class="font-bold text-lg uppercase italic text-indigo-900">${s.name}</span></div><div class="text-[9px] text-slate-400 font-bold italic uppercase">S/O ${s.father} | ${s.class}</div></td><td class="p-8 text-right font-black text-rose-600 text-lg italic">₹${s.bal}</td><td class="p-8 text-center"><div class="flex gap-1 justify-center">
                    <button onclick='openFeeModal(${JSON.stringify(s)})' class="bg-indigo-900 text-white text-[8px] px-3 py-2 rounded-lg font-black uppercase tracking-tighter shadow-md">➕ Add Fee</button>
                    <button onclick='printSingleReceipt(${JSON.stringify(s)})' class="bg-indigo-400 text-white text-[8px] px-3 py-2 rounded-lg font-bold uppercase">📄 Receipt</button>
                    <button onclick='printYearlyLedger(${JSON.stringify(s)})' class="bg-emerald-500 text-white text-[8px] px-3 py-2 rounded-lg font-bold uppercase">📊 Ledger</button>
                </div></td></tr>`;
            }).join('');
            document.getElementById('sumPaid').innerText = "₹" + tP.toLocaleString();
            document.getElementById('sumDue').innerText = "₹" + tD.toLocaleString();
            document.getElementById('activeCount').innerText = data.length;
        }

        // ENTRY LOGIC
        function openFeeModal(s) {
            selectedStudent = s;
            document.getElementById('targetStudent').innerText = `Adding payment for: ${s.name}`;
            document.getElementById('feeModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('feeModal').classList.add('hidden');
            document.getElementById('feeAmount').value = "";
        }

        async function submitFee() {
            const amount = document.getElementById('feeAmount').value;
            const month = document.getElementById('feeMonth').value;
            const btn = document.getElementById('submitBtn');

            if(!amount || amount <= 0) return alert("Please enter valid amount");

            btn.disabled = true;
            btn.innerText = "UPDATING...";

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        name: selectedStudent.name,
                        amount: amount,
                        month: month
                    })
                });
                
                // Since it's no-cors, we won't get a proper JSON back, so we assume success if no error thrown
                alert("Fees updated successfully in Google Sheet!");
                location.reload(); 
            } catch (e) {
                alert("Error updating fees. Check connection.");
                btn.disabled = false;
                btn.innerText = "SUBMIT";
            }
        }

        // Rest of functions (applyFilters, print, etc.) remain same...
        function populateClassFilter() {
            const classSelect = document.getElementById('classSelect');
            const uniqueClasses = [...new Set(masterData.map(s => s.class))].sort();
            uniqueClasses.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.innerText = "Class: " + c; classSelect.appendChild(opt); });
        }

        function applyFilters() {
            const sV = document.getElementById('searchInput').value.toLowerCase();
            const cV = document.getElementById('classSelect').value;
            filteredData = masterData.filter(d => (d.name.toLowerCase().includes(sV) || d.father.toLowerCase().includes(sV)) && (cV === "All" || d.class === cV));
            document.getElementById('classReportBtn').classList.toggle('hidden', cV === "All");
            renderTable(filteredData);
        }

        function printSingleReceipt(s) {
            document.querySelectorAll('.print-area').forEach(e => e.classList.remove('print-active'));
            document.getElementById('printAreaSingle').classList.add('print-active');
            window.print();
        }

        window.onload = init;
    </script>
</body>
</html>
