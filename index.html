<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto p-4 md:p-10">
        <header class="flex justify-between items-center mb-10 bg-indigo-900 p-6 rounded-2xl shadow-lg text-white">
            <div>
                <h1 class="text-2xl font-bold">School Fee Records</h1>
                <p id="status" class="text-indigo-200 text-xs font-bold uppercase tracking-widest mt-1">Connecting...</p>
            </div>
            <button onclick="loadData()" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded-lg text-sm transition">🔄 Refresh</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <input type="text" id="searchBox" onkeyup="filterData()" placeholder="Student ya Father's Name se search karein..." 
                   class="p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            <select id="classFilter" onchange="filterData()" class="p-4 rounded-2xl border-none shadow-sm outline-none font-semibold text-gray-600">
                <option value="All">All Classes</option>
                <option value="Nursery">Nursery</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-gray-400 text-xs uppercase font-bold tracking-tighter">
                            <th class="p-5">Roll No</th>
                            <th class="p-5">Student Name</th>
                            <th class="p-5">Father's Name</th>
                            <th class="p-5">Class</th>
                            <th class="p-5 text-right">Total Fee</th>
                            <th class="p-5 text-right">Paid</th>
                            <th class="p-5 text-right">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-50 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        let masterData = [];

        async function loadData() {
            const statusEl = document.getElementById('status');
            try {
                // Fetching via PapaParse with specific config
                Papa.parse(sheetURL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        masterData = results.data.map(row => {
                            const total = parseInt(String(row['Total Fee'] || 0).replace(/\D/g,'')) || 0;
                            const paid = parseInt(String(row['Paid Fee'] || 0).replace(/\D/g,'')) || 0;
                            return {
                                roll: row['Roll No'] || 'N/A',
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                class: row['Class'] || 'N/A',
                                total: total,
                                paid: paid,
                                balance: total - paid
                            };
                        }).filter(s => s.name.trim() !== "");

                        statusEl.innerText = "🟢 Connected to Excel";
                        statusEl.classList.add('text-green-400');
                        renderTable(masterData);
                    }
                });
            } catch (e) {
                statusEl.innerText = "🔴 Connection Error";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-5 font-bold text-indigo-900">${s.roll}</td>
                    <td class="p-5 font-bold text-gray-800">${s.name}</td>
                    <td class="p-5 text-indigo-600 font-medium italic">${s.father}</td>
                    <td class="p-5"><span class="bg-gray-100 px-2 py-1 rounded text-[10px] font-black uppercase">${s.class}</span></td>
                    <td class="p-5 text-right text-gray-500">₹${s.total.toLocaleString()}</td>
                    <td class="p-5 text-right text-green-600 font-bold">₹${s.paid.toLocaleString()}</td>
                    <td class="p-5 text-right">
                        <span class="${s.balance > 0 ? 'text-red-600 font-black' : 'text-gray-300 font-normal'}">
                            ₹${s.balance.toLocaleString()}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const classVal = document.getElementById('classFilter').value;
            const filtered = masterData.filter(s => 
                (s.name.toLowerCase().includes(search) || s.father.toLowerCase().includes(search)) && 
                (classVal === "All" || s.class === classVal)
            );
            renderTable(filtered);
        }

        window.onload = loadData;
    </script>
</body>
</html>
