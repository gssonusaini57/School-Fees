<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa International School - Fee Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .print-area { display: none; }
        @media print { 
            .no-print { display: none !important; } 
            .print-active { display: block !important; }
            body { background: white; padding: 0; }
            table { border-collapse: collapse; width: 100%; margin-top: 10px; }
            th, td { border: 1px solid #000 !important; padding: 6px; text-align: left; font-size: 10px; }
            .receipt-box { border: 2px dashed #000; padding: 15px; margin-bottom: 25px; page-break-inside: avoid; border-radius: 15px; position: relative; }
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="dashboard">
        <nav class="bg-white text-indigo-900 p-6 shadow-xl mb-8 border-b-4 border-indigo-600 no-print">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-5">
                    <img src="logo.PNG" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=KIS'" class="w-16 h-16 rounded-full border-4 border-indigo-100 shadow-lg">
                    <div>
                        <h1 class="text-2xl font-black uppercase tracking-tighter leading-none">Khalsa International School</h1>
                        <p class="text-indigo-500 font-bold text-[10px] italic">Patiala, Punjab | Ph: 94784-80771</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openManageModal()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">➕ New Student</button>
                    <button id="classReportBtn" onclick="printClassReport()" class="hidden bg-rose-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">Defaulter List</button>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">🔄 Sync Data</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 no-print">
            <div id="loader" class="p-20 text-center font-bold text-indigo-400 animate-pulse italic text-xl">Connecting to Database...</div>

            <div id="mainContent" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center uppercase italic font-bold">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-blue-500">Collected<h2 id="sumPaid" class="text-3xl font-black text-indigo-900">₹0</h2></div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-rose-500">Pending<h2 id="sumDue" class="text-3xl font-black text-rose-600">₹0</h2></div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-8 border-emerald-500">Students<h2 id="activeCount" class="text-3xl font-black text-emerald-600">0</h2></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 bg-white p-3 rounded-[2rem] shadow-lg border border-slate-100 italic">
                    <div class="md:col-span-2"><input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search Student Name..." class="w-full p-4 rounded-2xl border-none outline-none font-semibold bg-slate-50 italic"></div>
                    <div><select id="classSelect" onchange="applyFilters()" class="w-full p-4 rounded-2xl border-none font-bold text-indigo-600 bg-indigo-50 italic"><option value="All">All Classes</option></select></div>
                </div>

                <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden italic">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead><tr class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black border-b"><th class="p-8">Student Detail</th><th class="p-8 text-right">Balance</th><th class="p-8 text-center">Actions</th></tr></thead>
                            <tbody id="studentList" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="manageModal" class="fixed inset-0 bg-black/60 z-[120] hidden flex items-center justify-center p-4">
        </div>

    <script>
        // SCRIPT CONFIG
        const scriptURL = "https://script.google.com/macros/s/AKfycbwhfR7HKkxv1JSx5pN5SfJA4isYuCZfNjAbjLyJYeyoXED1CxCiRXuu3Z9Rt9oXJA4q/exec";
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv&t=" + new Date().getTime();
        
        let masterData = [];

        async function init() {
            try {
                const response = await fetch(sheetURL);
                if (!response.ok) throw new Error('Sheet connection failed');
                const csv = await response.text();
                
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const clean = (v) => parseInt(String(v || 0).replace(/\D/g,'')) || 0;
                            return {
                                name: row['Name'] || '',
                                father: row['Father Name'] || '',
                                class: row['Class'] || '',
                                paid: clean(row['Paid Fee']),
                                total: clean(row['Total Fee']),
                                bal: clean(row['Total Fee']) - clean(row['Paid Fee'])
                            };
                        }).filter(s => s.name);

                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('mainContent').classList.remove('hidden');
                        renderTable(masterData);
                        populateClassFilter();
                    }
                });
            } catch (e) {
                document.getElementById('loader').innerHTML = "❌ Error: Google Sheet not published or link broken.";
            }
        }

        function renderTable(data) {
            const list = document.getElementById('studentList');
            let tP = 0, tD = 0;
            list.innerHTML = data.map(s => {
                tP += s.paid; tD += s.bal;
                return `<tr class="border-b"><td class="p-8"><div><span class="font-bold text-lg uppercase italic">${s.name}</span></div><div class="text-[9px] text-slate-400 font-bold uppercase">S/O ${s.father} | ${s.class}</div></td><td class="p-8 text-right font-black text-rose-600 text-lg italic">₹${s.bal}</td><td class="p-8 text-center flex gap-1 justify-center"><button class="bg-indigo-600 text-white text-[9px] px-3 py-2 rounded-lg font-bold">Edit</button><button class="bg-emerald-600 text-white text-[9px] px-3 py-2 rounded-lg font-bold italic">Fee</button></td></tr>`;
            }).join('');
            document.getElementById('sumPaid').innerText = "₹" + tP.toLocaleString();
            document.getElementById('sumDue').innerText = "₹" + tD.toLocaleString();
            document.getElementById('activeCount').innerText = data.length;
        }

        function populateClassFilter() {
            const classSelect = document.getElementById('classSelect');
            const uniqueClasses = [...new Set(masterData.map(s => s.class))].sort();
            uniqueClasses.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.innerText = "Class: " + c; classSelect.appendChild(opt); });
        }

        function applyFilters() {
            const sV = document.getElementById('searchInput').value.toLowerCase();
            const cV = document.getElementById('classSelect').value;
            const filtered = masterData.filter(d => (d.name.toLowerCase().includes(sV) || d.father.toLowerCase().includes(sV)) && (cV === "All" || d.class === cV));
            renderTable(filtered);
        }

        window.onload = init;
    </script>
</body>
</html>
