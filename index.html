<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>DEBUG MODE - Khalsa School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-10 font-mono">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-yellow-500 mb-6">🔍 System Debugging Mode</h1>
        
        <div id="statusBox" class="bg-slate-800 p-6 rounded-xl border border-slate-700 space-y-4">
            <div id="step1">⏳ Step 1: Connecting to Google Sheet...</div>
            <div id="step2">⏳ Step 2: Reading CSV Data...</div>
            <div id="step3">⏳ Step 3: Checking Column Names...</div>
        </div>

        <div id="errorDetails" class="mt-10 p-6 bg-red-900/20 border border-red-500 rounded-xl hidden">
            <h2 class="text-red-500 font-bold uppercase mb-2">❌ Error Found:</h2>
            <p id="errorMessage" class="text-sm text-red-200"></p>
        </div>

        <div id="successBox" class="mt-10 p-6 bg-emerald-900/20 border border-emerald-500 rounded-xl hidden text-emerald-400">
            ✅ Data loaded successfully! Aapki website sahi chal rahi hai.
            <button onclick="location.reload()" class="block mt-4 bg-emerald-600 text-white px-4 py-2 rounded">Refresh Portal</button>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";

        async function startDebug() {
            try {
                // STEP 1
                const response = await fetch(sheetURL);
                if(response.ok) {
                    document.getElementById('step1').innerHTML = "✅ Step 1: Google Sheet Connected!";
                    document.getElementById('step1').classList.add('text-emerald-400');
                } else {
                    throw new Error("Google Sheet link kaam nahi kar raha. Kya apne 'Publish to Web' kiya hai?");
                }

                // STEP 2
                const csvText = await response.text();
                if(csvText.length > 10) {
                    document.getElementById('step2').innerHTML = "✅ Step 2: CSV Data Received!";
                    document.getElementById('step2').classList.add('text-emerald-400');
                } else {
                    throw new Error("CSV khali hai. Sheet mein data check karein.");
                }

                // STEP 3
                Papa.parse(csvText, {
                    header: true,
                    complete: function(results) {
                        const headers = results.meta.fields;
                        const required = ["Roll No", "Name", "Total Fee", "Paid Fee"];
                        let missing = [];

                        required.forEach(h => {
                            if(!headers.includes(h)) missing.push(h);
                        });

                        if(missing.length === 0) {
                            document.getElementById('step3').innerHTML = "✅ Step 3: All Columns Found!";
                            document.getElementById('step3').classList.add('text-emerald-400');
                            document.getElementById('successBox').classList.remove('hidden');
                        } else {
                            showError("Ye Columns nahi mil rahe: " + missing.join(", ") + ". Kripya Sheet mein spelling check karein.");
                        }
                    }
                });

            } catch (err) {
                showError(err.message);
            }
        }

        function showError(msg) {
            document.getElementById('errorDetails').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = msg;
        }

        window.onload = startDebug;
    </script>
</body>
</html>
