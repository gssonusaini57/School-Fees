<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saraswati School - Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div class="no-print">
        <nav class="bg-indigo-700 text-white p-6 shadow-2xl mb-8 border-b-4 border-indigo-900">
            <div class="max-w-7xl mx-auto flex flex-col md:row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-white p-2 rounded-2xl shadow-inner text-indigo-700 text-2xl font-black italic">SS</div>
                    <div>
                        <h1 class="text-2xl font-extrabold tracking-tight">SARASWATI SCHOOL</h1>
                        <p id="status" class="text-[10px] font-bold uppercase tracking-[0.2em] text-indigo-200">System Live & Connected</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="location.reload()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2.5 rounded-2xl text-xs font-bold transition-all shadow-lg border border-indigo-400">🔄 Refresh Data</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="glass-card p-8 rounded-[2.5rem] shadow-xl border-b-8 border-blue-500">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">Expected Revenue</p>
                    <h2 id="totalExp" class="text-4xl font-black text-slate-800 tracking-tighter">₹0</h2>
                </div>
                <div class="glass-card p-8 rounded-[2.5rem] shadow-xl border-b-8 border-emerald-500">
                    <p class="text-emerald-500 text-xs font-bold uppercase mb-2">Total Collection</p>
                    <h2 id="totalPaid" class="text-4xl font-black text-emerald-600 tracking-tighter">₹0</h2>
                </div>
                <div class="glass-card p-8 rounded-[2.5rem] shadow-xl border-b-8 border-rose-500">
                    <p class="text-rose-500 text-xs font-bold uppercase mb-2">Pending Dues</p>
                    <h2 id="totalDue" class="text-4xl font-black text-rose-600 tracking-tighter">₹0</h2>
                </div>
            </div>

            <div class="flex flex-col md:row gap-4 mb-10 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex-1 relative">
                    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search Student, Roll No or Father Name..." 
                           class="w-full pl-6 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-semibold text-slate-600">
                </div>
                <select id="classFilter" onchange="filterData()" class="w-full md:w-64 p-4 bg-slate-50 border-none rounded-2xl font-bold text-slate-500 cursor-pointer outline-none">
                    <option value="All">All Classes</option>
                    <option value="Nursery">Nursery</option>
                    <option value="LKG">LKG</option>
                    <option value="UKG">UKG</option>
                    <option value="1st">1st Class</option>
                </select>
            </div>

            <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100 text-slate-400 text-[11px] uppercase font-black tracking-widest">
                                <th class="p-8">Student Detail</th>
                                <th class="p-8">Father Detail</th>
                                <th class="p-8 text-right">Total Fee</th>
                                <th class="p-8 text-right">Collected</th>
                                <th class="p-8 text-right">Balance</th>
                                <th class="p-8 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable" class="divide-y divide-slate-50 font-semibold text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="printArea" class="print-only p-10 max-w-2xl mx-auto border-2 border-slate-900 rounded-3xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black">SARASWATI SCHOOL</h1>
            <p class="text-sm font-bold border-b pb-4">FEE PAYMENT RECEIPT</p>
        </div>
        <div class="grid grid-cols-2 gap-6 text-lg mb-10" id="receiptContent">
            </div>
        <div class="mt-20 flex justify-between">
            <p class="border-t border-black pt-2 px-8 font-bold text-sm text-center">Parent's Signature</p>
            <p class="border-t border-black pt-2 px-8 font-bold text-sm text-center">School Seal & Sign</p>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv&t=" + new Date().getTime();
        let masterData = [];

        async function init() {
            try {
                const response = await fetch(sheetURL);
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const tot = parseInt(String(row['Total Fee'] || 0).replace(/\D/g,'')) || 0;
                            const paid = parseInt(String(row['Paid Fee'] || 0).replace(/\D/g,'')) || 0;
                            return {
                                roll: row['Roll No'] || '-',
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                class: row['Class'] || 'N/A',
                                total: tot,
                                paid: paid,
                                bal: tot - paid
                            }
                        }).filter(s => s.name.trim() != "");
                        render(masterData);
                    }
                });
            } catch (e) { document.getElementById('status').innerText = "🔴 SYNC ERROR"; }
        }

        function render(data) {
            const list = document.getElementById('studentTable');
            let tTotal = 0, tPaid = 0, tDue = 0;
            
            list.innerHTML = data.map((s, index) => {
                tTotal += s.total; tPaid += s.paid; tDue += s.bal;
                return `
                <tr class="hover:bg-indigo-50/50 transition-all duration-300">
                    <td class="p-8">
                        <div class="text-slate-900 font-bold text-lg leading-tight">${s.name}</div>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">${s.class}</span>
                            <span class="text-slate-300 text-[10px] font-bold">#${s.roll}</span>
                        </div>
                    </td>
                    <td class="p-8">
                        <div class="text-slate-600 italic font-medium">S/O ${s.father}</div>
                    </td>
                    <td class="p-8 text-right font-bold text-slate-400 italic">₹${s.total.toLocaleString()}</td>
                    <td class="p-8 text-right text-emerald-600 font-black">₹${s.paid.toLocaleString()}</td>
                    <td class="p-8 text-right">
                        <div class="text-rose-600 font-black text-lg">₹${s.bal.toLocaleString()}</div>
                        <div class="text-[9px] uppercase font-bold ${s.bal > 0 ? 'text-rose-300' : 'text-emerald-400'}">
                            ${s.bal > 0 ? 'Dues Pending' : 'Fully Paid'}
                        </div>
                    </td>
                    <td class="p-8 text-center">
                        <button onclick='printReceipt(${JSON.stringify(s)})' 
                                class="bg-indigo-50 hover:bg-indigo-600 hover:text-white text-indigo-700 p-3 rounded-2xl transition-all shadow-sm border border-indigo-100 group">
                            <span class="text-xs font-bold">📄 Receipt</span>
                        </button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('totalExp').innerText = "₹" + tTotal.toLocaleString();
            document.getElementById('totalPaid').innerText = "₹" + tPaid.toLocaleString();
            document.getElementById('totalDue').innerText = "₹" + tDue.toLocaleString();
        }

        function printReceipt(s) {
            const content = `
                <div><p class="text-slate-400 font-bold text-xs uppercase">Student Name</p><p class="font-black">${s.name}</p></div>
                <div><p class="text-slate-400 font-bold text-xs uppercase">Class/Roll</p><p class="font-black">${s.class} / ${s.roll}</p></div>
                <div><p class="text-slate-400 font-bold text-xs uppercase">Father's Name</p><p class="font-black">${s.father}</p></div>
                <div><p class="text-slate-400 font-bold text-xs uppercase">Receipt Date</p><p class="font-black">${new Date().toLocaleDateString()}</p></div>
                <div class="col-span-2 border-y py-4 my-4">
                    <div class="flex justify-between font-bold mb-2"><span>Paid Amount:</span><span>₹${s.paid}</span></div>
                    <div class="flex justify-between text-rose-600 font-black"><span>Remaining Dues:</span><span>₹${s.bal}</span></div>
                </div>
            `;
            document.getElementById('receiptContent').innerHTML = content;
            window.print();
        }

        function filterData() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const c = document.getElementById('classFilter').value;
            const filtered = masterData.filter(d => 
                (d.name.toLowerCase().includes(s) || d.father.toLowerCase().includes(s) || d.roll.includes(s)) && 
                (c === "All" || d.class === c)
            );
            render(filtered);
        }

        window.onload = init;
    </script>
</body>
</html>
