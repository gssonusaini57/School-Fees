<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa School - Admin Portal v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .modal-active { display: flex !important; }
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="dashboard">
        <nav class="bg-white p-6 shadow-md mb-8 border-b-4 border-indigo-600 no-print">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="logo.PNG" class="w-14 h-14 rounded-full border shadow-sm" onerror="this.src='https://via.placeholder.com/60'">
                    <div>
                        <h1 class="text-xl font-black text-indigo-900 uppercase leading-none">Khalsa School</h1>
                        <p class="text-[10px] font-bold text-indigo-500 italic uppercase">Admin Dashboard</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openAddModal()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-lg uppercase tracking-widest">➕ New Student</button>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-lg uppercase">🔄 Sync</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 no-print">
            <div id="loader" class="p-20 text-center font-bold text-indigo-400 animate-pulse text-xl italic">🔄 Database se jud rahe hain...</div>
            
            <div id="mainContent" class="hidden">
                <div class="mb-8 bg-white p-2 rounded-3xl shadow-lg border border-slate-100 flex items-center">
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Student ka naam ya Phone No. search karein..." class="w-full p-4 rounded-2xl border-none outline-none font-bold bg-slate-50 italic">
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden">
                    <table class="w-full text-left italic">
                        <thead>
                            <tr class="bg-slate-100 text-slate-500 text-[10px] uppercase font-black border-b">
                                <th class="p-6">Student Information</th>
                                <th class="p-6 text-right">Balance</th>
                                <th class="p-6 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentList" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="manageModal" class="fixed inset-0 bg-black/70 z-[150] hidden items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-y-auto max-h-[90vh]">
            <h2 id="modalTitle" class="text-2xl font-black text-indigo-900 mb-6 uppercase italic border-b-4 border-indigo-100 pb-2">Registration</h2>
            
            <div class="space-y-4 font-bold">
                <input type="hidden" id="editOldName">
                
                <div>
                    <label class="text-[10px] text-slate-400 uppercase ml-2">Full Name</label>
                    <input type="text" id="mName" placeholder="Enter Student Name" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="text-[10px] text-slate-400 uppercase ml-2">Father's Name</label>
                    <input type="text" id="mFather" placeholder="Enter Father's Name" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase ml-2">Class</label>
                        <input type="text" id="mClass" placeholder="e.g. 5th" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-indigo-600 uppercase ml-2 font-black italic">Phone Number (📞)</label>
                        <input type="text" id="mPhone" placeholder="Mobile No." class="w-full p-4 bg-indigo-50 border-2 border-indigo-300 rounded-2xl outline-none text-indigo-800 font-black placeholder-indigo-300">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-400 uppercase ml-2">Total Annual Fee (₹)</label>
                    <input type="number" id="mTotalFee" placeholder="Enter Total Fee" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-black text-xl outline-none focus:border-indigo-500">
                </div>

                <div class="flex gap-3 pt-6">
                    <button onclick="closeManageModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-black uppercase text-slate-500 hover:bg-slate-200">Cancel</button>
                    <button id="saveBtn" onclick="submitStudentData()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl shadow-lg font-black uppercase hover:bg-indigo-700">Save Data</button>
                </div>
            </div>
        </div>
    </div>

    <div id="feeModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
            <h2 class="text-2xl font-black text-indigo-900 mb-6 uppercase italic underline">Fee Entry</h2>
            <p id="targetStudent" class="text-indigo-500 font-black mb-6 uppercase border-b-2 border-indigo-50 pb-2"></p>
            <input type="number" id="feeAmount" placeholder="Amount (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-indigo-100 font-black text-xl mb-4 outline-none">
            <select id="feeMonth" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold mb-8 outline-none">
                <option value="April">April</option><option value="May">May</option><option value="June">June</option>
                <option value="July">July</option><option value="Aug">Aug</option><option value="Sept">Sept</option>
                <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
                <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="March">March</option>
            </select>
            <div class="flex gap-3">
                <button onclick="closeFeeModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold uppercase">Back</button>
                <button id="feeSubmitBtn" onclick="submitFee()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl shadow-lg font-black uppercase">Pay Now</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlHFYV0reRa09njTrq9GYbcgbRKL8gNLmU4-iUsoIjpFxuflBGOYP4bgyhXknQD-gN/exec";
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        
        let masterData = [];

        async function init() {
            try {
                const response = await fetch(sheetURL + "&t=" + Date.now());
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true, skipEmptyLines: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const clean = (v) => parseInt(String(v || 0).replace(/\D/g,'')) || 0;
                            return { 
                                name: row['Name'] || '', father: row['Father Name'] || '', 
                                class: row['Class'] || '', phone: row['Phone'] || 'No Phone',
                                total: clean(row['Total Fee']), paid: clean(row['Paid Fee']), 
                                bal: clean(row['Total Fee']) - clean(row['Paid Fee'])
                            };
                        }).filter(s => s.name);
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('mainContent').classList.remove('hidden');
                        renderTable(masterData);
                    }
                });
            } catch (e) { alert("Offline Error!"); }
        }

        function renderTable(data) {
            const list = document.getElementById('studentList');
            list.innerHTML = data.map((s) => `
                <tr class="border-b hover:bg-indigo-50 transition-all">
                    <td class="p-6">
                        <div class="font-black text-indigo-950 uppercase italic text-lg leading-tight">${s.name}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">S/O ${s.father} | ${s.class} | 📞 ${s.phone}</div>
                    </td>
                    <td class="p-6 text-right font-black text-rose-600 text-lg">₹${s.bal}</td>
                    <td class="p-6 text-center flex flex-wrap gap-1 justify-center">
                        <button onclick='openFeeModal(${JSON.stringify(s)})' class="bg-indigo-900 text-white text-[8px] px-3 py-2 rounded-lg font-black uppercase shadow">➕ Fee</button>
                        <button onclick='openEditModal(${JSON.stringify(s)})' class="bg-blue-600 text-white text-[8px] px-3 py-2 rounded-lg font-black uppercase shadow">✏️ Edit</button>
                    </td>
                </tr>`).join('');
        }

        // ADD STUDENT
        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Register Student";
            document.getElementById('editOldName').value = "";
            document.getElementById('mName').value = ""; document.getElementById('mFather').value = "";
            document.getElementById('mClass').value = ""; document.getElementById('mPhone').value = "";
            document.getElementById('mTotalFee').value = ""; 
            document.getElementById('manageModal').classList.remove('hidden');
            document.getElementById('manageModal').classList.add('modal-active');
        }

        // EDIT STUDENT
        function openEditModal(s) {
            document.getElementById('modalTitle').innerText = "Update: " + s.name;
            document.getElementById('editOldName').value = s.name;
            document.getElementById('mName').value = s.name; document.getElementById('mFather').value = s.father;
            document.getElementById('mClass').value = s.class; document.getElementById('mPhone').value = s.phone;
            document.getElementById('mTotalFee').value = s.total; 
            document.getElementById('manageModal').classList.remove('hidden');
            document.getElementById('manageModal').classList.add('modal-active');
        }

        function closeManageModal() { 
            document.getElementById('manageModal').classList.add('hidden'); 
            document.getElementById('manageModal').classList.remove('modal-active');
        }

        async function submitStudentData() {
            const btn = document.getElementById('saveBtn');
            const oldName = document.getElementById('editOldName').value;
            const payload = { 
                action: oldName ? "update" : "add", 
                oldName: oldName,
                name: document.getElementById('mName').value, 
                father: document.getElementById('mFather').value, 
                class: document.getElementById('mClass').value, 
                phone: document.getElementById('mPhone').value,
                totalFee: document.getElementById('mTotalFee').value 
            };
            if(!payload.name || !payload.totalFee) return alert("Poori detail bharein!");
            btn.innerText = "SAVING..."; btn.disabled = true;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Done! Reloading..."); location.reload();
        }

        // FEE ENTRY
        let selectedS;
        function openFeeModal(s) { selectedS = s; document.getElementById('targetStudent').innerText = s.name; document.getElementById('feeModal').classList.remove('hidden'); document.getElementById('feeModal').classList.add('modal-active'); }
        function closeFeeModal() { document.getElementById('feeModal').classList.add('hidden'); document.getElementById('feeModal').classList.remove('modal-active'); }
        async function submitFee() {
            const amount = document.getElementById('feeAmount').value;
            const month = document.getElementById('feeMonth').value;
            const btn = document.getElementById('feeSubmitBtn');
            btn.innerText = "UPDATING..."; btn.disabled = true;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "fee", name: selectedS.name, amount: amount, month: month }) });
            alert("Payment Recorded!"); location.reload();
        }

        function applyFilters() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = masterData.filter(d => d.name.toLowerCase().includes(val) || d.phone.includes(val));
            renderTable(filtered);
        }
        window.onload = init;
    </script>
</body>
</html>
