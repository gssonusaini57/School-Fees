<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalsa School - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .print-area { display: none; }
        @media print { .no-print { display: none !important; } .print-active { display: block !important; } body { background: white; } }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="dashboard">
        <nav class="bg-white p-6 shadow-xl mb-8 border-b-4 border-indigo-600 no-print">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="logo.PNG" class="w-14 h-14 rounded-full border shadow-sm" onerror="this.src='https://via.placeholder.com/60'">
                    <h1 class="text-xl font-black text-indigo-900">KHALSA SCHOOL</h1>
                </div>
                <div class="flex gap-2">
                    <button onclick="openAddModal()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">➕ New Student</button>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold shadow-lg uppercase italic">🔄 Sync</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 no-print">
            <div id="loader" class="p-20 text-center font-bold text-indigo-400 animate-pulse text-xl">Connecting...</div>
            <div id="mainContent" class="hidden">
                <div class="mb-8 flex gap-4 bg-white p-3 rounded-3xl shadow-lg">
                    <select id="classSelect" onchange="applyFilters()" class="p-4 rounded-2xl border-none font-bold text-indigo-600 bg-indigo-50"><option value="All">All Classes</option></select>
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search Name/Phone..." class="w-full p-4 rounded-2xl border-none outline-none font-bold bg-slate-50 italic">
                </div>
                <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden italic">
                    <table class="w-full text-left">
                        <thead><tr class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black border-b"><th class="p-6">Student Info</th><th class="p-6 text-right">Balance</th><th class="p-6 text-center">Action</th></tr></thead>
                        <tbody id="studentList" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="manageModal" class="fixed inset-0 bg-black/60 z-[120] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-lg">
            <h2 id="modalTitle" class="text-2xl font-black text-indigo-900 mb-6 uppercase italic">Registration Form</h2>
            <div class="space-y-4 font-bold">
                <input type="hidden" id="editOldName">
                
                <div>
                    <label class="text-[10px] text-slate-400 uppercase ml-2">Student Full Name</label>
                    <input type="text" id="mName" placeholder="Enter Name" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none">
                </div>
                
                <div>
                    <label class="text-[10px] text-slate-400 uppercase ml-2">Father's Name</label>
                    <input type="text" id="mFather" placeholder="Enter Father Name" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase ml-2">Class</label>
                        <input type="text" id="mClass" placeholder="Class" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-indigo-600 uppercase ml-2 font-black">Phone Number (Required)</label>
                        <input type="text" id="mPhone" placeholder="Mobile No." class="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl outline-none text-indigo-700">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-400 uppercase ml-2">Total Yearly Fees (₹)</label>
                    <input type="number" id="mTotalFee" placeholder="Fees" class="w-full p-4 bg-slate-50 rounded-2xl border font-black text-xl outline-none">
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="closeManageModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold uppercase">Cancel</button>
                    <button id="saveBtn" onclick="submitStudentData()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl shadow-lg font-black uppercase">Save Data</button>
                </div>
            </div>
        </div>
    </div>

    <div id="feeModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-black text-indigo-900 mb-6 text-center italic underline">FEE PAYMENT</h2>
            <p id="targetStudent" class="text-indigo-500 font-bold text-center mb-6 uppercase italic"></p>
            <input type="number" id="feeAmount" placeholder="Amount (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 font-bold text-lg mb-4 outline-none">
            <select id="feeMonth" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold mb-6">
                <option value="April">April</option><option value="May">May</option><option value="June">June</option>
                <option value="July">July</option><option value="Aug">Aug</option><option value="Sept">Sept</option>
                <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
                <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="March">March</option>
            </select>
            <div class="flex gap-3">
                <button onclick="closeFeeModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl">BACK</button>
                <button id="feeSubmitBtn" onclick="submitFee()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl shadow-lg font-black">PAY NOW</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlHFYV0reRa09njTrq9GYbcgbRKL8gNLmU4-iUsoIjpFxuflBGOYP4bgyhXknQD-gN/exec";
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        
        let masterData = [];

        async function init() {
            try {
                const response = await fetch(sheetURL + "&t=" + Date.now());
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true, skipEmptyLines: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const clean = (v) => parseInt(String(v || 0).replace(/\D/g,'')) || 0;
                            return { 
                                name: row['Name'], father: row['Father Name'], class: row['Class'], 
                                phone: row['Phone'] || 'N/A', total: clean(row['Total Fee']), 
                                paid: clean(row['Paid Fee']), bal: clean(row['Total Fee']) - clean(row['Paid Fee'])
                            };
                        }).filter(s => s.name);
                        populateClassFilter();
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('mainContent').classList.remove('hidden');
                        renderTable(masterData);
                    }
                });
            } catch (e) { console.error(e); }
        }

        function renderTable(data) {
            const list = document.getElementById('studentList');
            list.innerHTML = data.map((s) => `
                <tr class="border-b">
                    <td class="p-6">
                        <div class="font-black text-indigo-950 uppercase italic text-lg leading-tight">${s.name}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase italic tracking-tighter">S/O ${s.father} | ${s.class} | 📞 ${s.phone}</div>
                    </td>
                    <td class="p-6 text-right font-black text-rose-600 italic">₹${s.bal}</td>
                    <td class="p-6 text-center flex flex-wrap gap-1 justify-center">
                        <button onclick='openFeeModal(${JSON.stringify(s)})' class="bg-indigo-900 text-white text-[8px] px-3 py-2 rounded-lg font-black shadow">➕ Fee</button>
                        <button onclick='openEditModal(${JSON.stringify(s)})' class="bg-blue-600 text-white text-[8px] px-3 py-2 rounded-lg font-black shadow">✏️ Edit</button>
                    </td>
                </tr>`).join('');
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Register New Student";
            document.getElementById('editOldName').value = "";
            document.getElementById('mName').value = ""; document.getElementById('mFather').value = "";
            document.getElementById('mClass').value = ""; document.getElementById('mPhone').value = "";
            document.getElementById('mTotalFee').value = ""; document.getElementById('manageModal').classList.remove('hidden');
        }

        function openEditModal(s) {
            document.getElementById('modalTitle').innerText = "Update Details";
            document.getElementById('editOldName').value = s.name;
            document.getElementById('mName').value = s.name; document.getElementById('mFather').value = s.father;
            document.getElementById('mClass').value = s.class; document.getElementById('mPhone').value = s.phone;
            document.getElementById('mTotalFee').value = s.total; document.getElementById('manageModal').classList.remove('hidden');
        }

        function closeManageModal() { document.getElementById('manageModal').classList.add('hidden'); }

        async function submitStudentData() {
            const btn = document.getElementById('saveBtn');
            const oldName = document.getElementById('editOldName').value;
            const payload = { 
                action: oldName ? "update" : "add", 
                oldName: oldName,
                name: document.getElementById('mName').value, 
                father: document.getElementById('mFather').value, 
                class: document.getElementById('mClass').value, 
                phone: document.getElementById('mPhone').value,
                totalFee: document.getElementById('mTotalFee').value 
            };
            btn.innerText = "SAVING..."; btn.disabled = true;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Updated Successfully!"); location.reload();
        }

        function openFeeModal(s) { selectedStudent = s; document.getElementById('targetStudent').innerText = s.name; document.getElementById('feeModal').classList.remove('hidden'); }
        function closeFeeModal() { document.getElementById('feeModal').classList.add('hidden'); }
        async function submitFee() {
            const amount = document.getElementById('feeAmount').value;
            const month = document.getElementById('feeMonth').value;
            const btn = document.getElementById('feeSubmitBtn');
            btn.innerText = "UPDATING..."; btn.disabled = true;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "fee", name: selectedStudent.name, amount: amount, month: month }) });
            alert("Fees Updated!"); location.reload();
        }

        function populateClassFilter() {
            const classSelect = document.getElementById('classSelect');
            const uniqueClasses = [...new Set(masterData.map(s => s.class))].sort();
            uniqueClasses.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.innerText = "Class: " + c; classSelect.appendChild(opt); });
        }
        function applyFilters() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const cV = document.getElementById('classSelect').value;
            const filtered = masterData.filter(d => (d.name.toLowerCase().includes(val) || d.phone.includes(val)) && (cV === "All" || d.class === cV));
            renderTable(filtered);
        }
        window.onload = init;
    </script>
</body>
</html>
