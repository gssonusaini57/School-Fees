<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee - Monthly Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .month-chip { font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: 800; border: 1px solid transparent; }
        .paid { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .pending { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    </style>
</head>
<body class="antialiased text-slate-800">

    <nav class="bg-indigo-800 text-white p-6 shadow-2xl mb-8 border-b-4 border-indigo-950">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">MONTHLY FEE TRACKER</h1>
            <button onclick="location.reload()" class="bg-indigo-600 px-5 py-2 rounded-xl text-xs font-bold shadow-lg">🔄 Sync Data</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-indigo-500">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Total Collection</p>
                <h2 id="sumPaid" class="text-3xl font-black text-indigo-900 tracking-tighter">₹0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-rose-500">
                <p class="text-rose-400 text-[10px] font-bold uppercase tracking-widest">Total Pending</p>
                <h2 id="sumDue" class="text-3xl font-black text-rose-600 tracking-tighter">₹0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-emerald-500">
                <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest">Students Paid</p>
                <h2 id="activeCount" class="text-3xl font-black text-emerald-600 tracking-tighter">0</h2>
            </div>
        </div>

        <div class="mb-8">
            <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Type student name to track monthly fees..." 
                   class="w-full p-5 rounded-3xl border-none shadow-xl outline-none focus:ring-4 focus:ring-indigo-100 font-semibold">
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                            <th class="p-8">Student & Monthly Status</th>
                            <th class="p-8">Total Fee</th>
                            <th class="p-8">Collected</th>
                            <th class="p-8 text-right">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="studentList" class="divide-y divide-slate-50 font-semibold">
                        </tbody>
                </table>
            </div>
            <div id="loader" class="p-20 text-center font-bold text-indigo-300 animate-pulse">Checking Monthly Ledgers...</div>
        </div>
    </main>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv&t=" + new Date().getTime();
        let masterData = [];
        const months = ["April", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec", "Jan", "Feb", "March"];

        async function init() {
            try {
                const response = await fetch(sheetURL);
                const csv = await response.text();
                Papa.parse(csv, {
                    header: true,
                    complete: (res) => {
                        masterData = res.data.map(row => {
                            const tot = parseInt(row['Total Fee']) || 0;
                            const paid = parseInt(row['Paid Fee']) || 0;
                            
                            // Check month-wise payment
                            let monthlyStatus = {};
                            months.forEach(m => {
                                monthlyStatus[m] = parseInt(row[m]) > 0 ? true : false;
                            });

                            return {
                                name: row['Name'] || '',
                                father: row['Father Name'] || '-',
                                class: row['Class'] || '-',
                                total: tot,
                                paid: paid,
                                bal: tot - paid,
                                months: monthlyStatus
                            };
                        }).filter(s => s.name != "");
                        render(masterData);
                    }
                });
            } catch (e) { console.error("Error loading data"); }
        }

        function render(data) {
            const list = document.getElementById('studentList');
            let tPaid = 0, tDue = 0, tCount = 0;

            list.innerHTML = data.map(s => {
                tPaid += s.paid; tDue += s.bal;
                if(s.paid > 0) tCount++;

                let monthHTML = months.map(m => `
                    <span class="month-chip ${s.months[m] ? 'paid' : 'pending'}">${m.substring(0,3).toUpperCase()}</span>
                `).join('');

                return `
                <tr class="hover:bg-indigo-50/50 transition duration-300">
                    <td class="p-8">
                        <div class="text-slate-900 font-bold text-lg">${s.name}</div>
                        <div class="text-[10px] text-slate-400 mb-3 uppercase tracking-wider font-bold">S/O ${s.father} | Class: ${s.class}</div>
                        <div class="flex flex-wrap gap-1 mt-2">${monthHTML}</div>
                    </td>
                    <td class="p-8 text-slate-400 font-bold">₹${s.total}</td>
                    <td class="p-8 text-emerald-600 font-black">₹${s.paid}</td>
                    <td class="p-8 text-right">
                        <div class="text-rose-600 font-black text-xl leading-none">₹${s.bal}</div>
                        <span class="text-[8px] uppercase font-black text-rose-300 tracking-widest">Pending Balance</span>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('sumPaid').innerText = "₹" + tPaid.toLocaleString();
            document.getElementById('sumDue').innerText = "₹" + tDue.toLocaleString();
            document.getElementById('activeCount').innerText = tCount;
            document.getElementById('loader').classList.add('hidden');
        }

        function filterData() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = masterData.filter(d => d.name.toLowerCase().includes(val) || d.father.toLowerCase().includes(val));
            render(filtered);
        }

        window.onload = init;
    </script>
</body>
</html>
