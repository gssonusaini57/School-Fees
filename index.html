<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee System - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto p-4 md:pt-10">
        <header class="bg-indigo-900 text-white p-8 rounded-[2rem] shadow-2xl mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold tracking-tight">Saraswati School Fee System</h1>
                <p id="status" class="mt-2 text-indigo-300 font-bold text-xs uppercase tracking-widest flex items-center justify-center md:justify-start gap-2">
                    <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span>
                    Connecting to Excel...
                </p>
            </div>
            <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 px-6 py-2 rounded-xl text-sm font-semibold border border-white/20 transition-all">
                🔄 Update Data
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="md:col-span-2 relative">
                <input type="text" id="searchBox" onkeyup="filterData()" placeholder="Search Student or Father Name..." 
                       class="w-full p-5 rounded-2xl shadow-sm border-none outline-none focus:ring-4 focus:ring-indigo-100 text-gray-700 text-lg">
            </div>
            <select id="classFilter" onchange="filterData()" class="p-5 rounded-2xl shadow-sm outline-none font-bold text-gray-500 bg-white">
                <option value="All">All Classes</option>
                <option value="Nursery">Nursery</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
            </select>
        </div>

        <div id="summary" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 hidden">
             <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-gray-400 text-[10px] uppercase font-bold">Total Fees</p>
                <p id="totalSum" class="text-xl font-black text-gray-800">₹0</p>
             </div>
             <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-green-500 text-center">
                <p class="text-gray-400 text-[10px] uppercase font-bold">Total Paid</p>
                <p id="paidSum" class="text-xl font-black text-green-600">₹0</p>
             </div>
             <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-red-500 text-center">
                <p class="text-gray-400 text-[10px] uppercase font-bold">Total Balance</p>
                <p id="balanceSum" class="text-xl font-black text-red-600">₹0</p>
             </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-gray-400 text-[11px] uppercase font-black tracking-widest">
                            <th class="p-6">Roll No</th>
                            <th class="p-6 text-indigo-900">Student Name</th>
                            <th class="p-6">Father Name</th>
                            <th class="p-6 text-right">Total</th>
                            <th class="p-6 text-right">Paid</th>
                            <th class="p-6 text-right">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-50 text-sm font-semibold text-gray-700">
                        </tbody>
                </table>
            </div>
            <div id="loader" class="p-20 text-center"><p class="animate-bounce text-indigo-300">Loading Student Records...</p></div>
        </div>
    </div>

    <script>
