<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="bg-indigo-900 text-white p-8 rounded-3xl shadow-2xl mb-8">
            <h1 class="text-3xl font-bold italic">School Fee Dashboard</h1>
            <p id="status" class="text-indigo-300 text-sm mt-2 font-bold uppercase tracking-widest">Excel se connect ho raha hai...</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <input type="text" id="searchBox" onkeyup="filterData()" placeholder="Student ya Father ka naam search karein..." 
                   class="p-4 rounded-2xl shadow-sm border-none outline-none focus:ring-2 focus:ring-indigo-500">
            <select id="classFilter" onchange="filterData()" class="p-4 rounded-2xl shadow-sm outline-none font-bold text-gray-600">
                <option value="All">All Classes</option>
                <option value="Nursery">Nursery</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b text-gray-400 text-xs uppercase font-black tracking-widest">
                            <th class="p-5">Roll No</th>
                            <th class="p-5 text-indigo-900">Student Name</th>
                            <th class="p-5">Father's Name</th>
                            <th class="p-5">Class</th>
                            <th class="p-5 text-right">Total</th>
                            <th class="p-5 text-right text-green-600">Paid</th>
                            <th class="p-5 text-right text-red-600">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-gray-50 text-sm font-medium text-gray-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Aapka Sheet Link
        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTODyF_qpA935fHJdYoHSGiOrEgUyeR1qX1cssYJ9BIu6miJIDnUYqf-f5DctFWzfG7v7EWV1FntLup/pub?gid=1095208276&single=true&output=csv";
        
        let masterData = [];

        function loadData() {
            Papa.parse(csvURL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    console.log("Raw Data:", results.data); // Testing ke liye
                    masterData = results.data.map(row => {
                        const total = parseInt(String(row['Total Fee'] || 0).replace(/\D/g,'')) || 0;
                        const paid = parseInt(String(row['Paid Fee'] || 0).replace(/\D/g,'')) || 0;
                        return {
                            roll: row['Roll No'] || '-',
                            name: row['Name'] || '',
                            father: row['Father Name'] || '-',
                            class: row['Class'] || '-',
                            total: total,
                            paid: paid,
                            balance: total - paid
                        };
                    }).filter(s => s.name.trim() !== "");

                    document.getElementById('status').innerText = "🟢 LIVE: Excel se Connected";
                    document.getElementById('status').className = "text-green-400 text-sm mt-2 font-bold uppercase";
                    renderTable(masterData);
                },
                error: function() {
                    document.getElementById('status').innerText = "🔴 Connection Error";
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-5 font-bold text-gray-400">${s.roll}</td>
                    <td class="p-5 font-bold text-gray-900">${s.name}</td>
                    <td class="p-5 text-indigo-600 italic font-semibold">${s.father}</td>
                    <td class="p-5"><span class="bg-gray-100 px-3 py-1 rounded-full text-[10px] font-black uppercase">${s.class}</span></td>
                    <td class="p-5 text-right text-gray-400 font-bold">₹${s.total.toLocaleString()}</td>
                    <td class="p-5 text-right text-green-600 font-black">₹${s.paid.toLocaleString()}</td>
                    <td class="p-5 text-right">
                        <span class="${s.balance > 0 ? 'bg-red-50 text-red-600 px-4 py-2 rounded-xl font-black' : 'text-gray-300 font-normal'}">
                            ₹${s.balance.toLocaleString()}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const classVal = document.getElementById('classFilter').value;
            const filtered = masterData.filter(s => 
                (s.name.toLowerCase().includes(search) || s.father.toLowerCase().includes(search)) && 
                (classVal === "All" || s.class === classVal)
            );
            renderTable(filtered);
        }

        window.onload = loadData;
    </script>
</body>
</html>
